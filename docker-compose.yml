services:
  reference:
    image: ${PDPP_REFERENCE_IMAGE:-ghcr.io/vana-com/pdpp/reference:main}
    build:
      context: .
      dockerfile: Dockerfile
      target: reference
    environment:
      AS_PORT: "7662"
      RS_PORT: "7663"
      PDPP_REFERENCE_MODE: composed
      PDPP_REFERENCE_ORIGIN: ${PDPP_REFERENCE_ORIGIN:-http://localhost:3002}
      PDPP_DB_PATH: ${PDPP_DB_PATH:-/var/lib/pdpp/pdpp.sqlite}
      PDPP_EMBEDDING_CACHE_DIR: ${PDPP_EMBEDDING_CACHE_DIR:-/var/cache/pdpp/transformers}
      PDPP_EMBEDDING_DOWNLOAD_ALLOWED: ${PDPP_EMBEDDING_DOWNLOAD_ALLOWED:-1}
      PDPP_REFERENCE_OPERATIONAL_DEFAULTS: "1"
      PDPP_OWNER_PASSWORD: ${PDPP_OWNER_PASSWORD:-}
      PDPP_OWNER_SUBJECT_ID: ${PDPP_OWNER_SUBJECT_ID:-owner_local}
      PDPP_DCR_INITIAL_ACCESS_TOKENS: ${PDPP_DCR_INITIAL_ACCESS_TOKENS:-}
      # Host browser bridge — opt-in for browser-backed connectors (e.g. ChatGPT,
      # USAA) that need a visible host browser the operator can see and click.
      # Run `pnpm --dir packages/polyfill-connectors exec tsx bin/host-browser-bridge.ts
      # --profile <name>` on the host first; the bridge prints the URL+token to
      # export here. See openspec/changes/design-host-browser-bridge-for-docker.
      PDPP_HOST_BROWSER_BRIDGE_URL: ${PDPP_HOST_BROWSER_BRIDGE_URL:-}
      PDPP_HOST_BROWSER_BRIDGE_TOKEN: ${PDPP_HOST_BROWSER_BRIDGE_TOKEN:-}
      PDPP_HOST_BROWSER_BRIDGE_DAILY_CHROME: ${PDPP_HOST_BROWSER_BRIDGE_DAILY_CHROME:-}
    # Required on Linux so the container can resolve `host.docker.internal` to
    # the host gateway (already provided automatically on macOS/Windows). Safe
    # to leave on every platform.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "7662:7662"
      - "7663:7663"
    volumes:
      - ./packages/polyfill-connectors/.pdpp-data:/var/lib/pdpp
      - pdpp-transformers:/var/cache/pdpp/transformers
      - pdpp-home:/root/.pdpp
    # Health = AS and RS are both listening and serving public metadata.
    # Embedding-model download and semantic backfill run in the background
    # after listen and are intentionally NOT part of "healthy".
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:7662/.well-known/oauth-authorization-server >/dev/null && curl -fsS http://localhost:7663/.well-known/oauth-protected-resource >/dev/null",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  web:
    image: ${PDPP_WEB_IMAGE:-ghcr.io/vana-com/pdpp/web:main}
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    depends_on:
      reference:
        condition: service_healthy
    environment:
      PDPP_REFERENCE_MODE: composed
      PDPP_REFERENCE_ORIGIN: ${PDPP_REFERENCE_ORIGIN:-http://localhost:3002}
      PDPP_AS_URL: http://reference:7662
      PDPP_RS_URL: http://reference:7663
      PDPP_OWNER_PASSWORD: ${PDPP_OWNER_PASSWORD:-}
      PDPP_OWNER_SUBJECT_ID: ${PDPP_OWNER_SUBJECT_ID:-owner_local}
      PDPP_ENABLE_DASHBOARD: ${PDPP_ENABLE_DASHBOARD:-1}
    ports:
      - "${PDPP_WEB_PORT:-3002}:3000"

volumes:
  pdpp-transformers:
  pdpp-home:
