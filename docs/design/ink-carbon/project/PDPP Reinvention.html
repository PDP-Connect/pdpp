<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>PDPP — Reinvention</title>

  <link href="reinvention/envelope.css" rel="stylesheet" />
  <link href="reinvention/cadastral.css" rel="stylesheet" />
  <link href="reinvention/strips.css" rel="stylesheet" />

  <script crossorigin="anonymous" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script crossorigin="anonymous" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script crossorigin="anonymous" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <script src="reinvention/design-canvas.jsx" type="text/babel"></script>
  <script src="reinvention/boards-envelope.jsx" type="text/babel"></script>
  <script src="reinvention/boards-cadastral.jsx" type="text/babel"></script>
  <script src="reinvention/boards-strips.jsx" type="text/babel"></script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const {
      DesignCanvas, DCSection, DCArtboard,
      EnvIdentity, EnvSurfaces,
      PlatIdentity, PlatSurfaces,
      StrIdentity, StrSurfaces,
    } = window;

    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="envelope"
            subtitle="Security-tint envelopes · die-cut windows · permit indicia. Granted is typed; withheld is tinted."
            title="A — Security Tint"
          >
            <DCArtboard id="env-identity" label="A1 · Identity & grammar" width={760} height={1200}>
              <EnvIdentity />
            </DCArtboard>
            <DCArtboard id="env-surfaces" label="A2 · Core surfaces" width={760} height={1005}>
              <EnvSurfaces />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="plat"
            subtitle="County plat maps · recorded easements · Sanborn fills. Scopes are parcels; withheld is N.A.P.; revoked is vacated."
            title="B — Plat"
          >
            <DCArtboard id="plat-identity" label="B1 · Identity & the plat" width={760} height={1156}>
              <PlatIdentity />
            </DCArtboard>
            <DCArtboard id="plat-surfaces" label="B2 · Core surfaces" width={760} height={916}>
              <PlatSurfaces />
            </DCArtboard>
          </DCSection>

          <DCSection
            id="strips"
            subtitle="Flight progress strips · one strip per grant · cocked = attention, pulled = revoked. Type: B612."
            title="C — Strip Bay"
          >
            <DCArtboard id="str-identity" label="C1 · Identity & anatomy" width={760} height={875}>
              <StrIdentity />
            </DCArtboard>
            <DCArtboard id="str-surfaces" label="C2 · The bay" width={760} height={600}>
              <StrSurfaces />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
