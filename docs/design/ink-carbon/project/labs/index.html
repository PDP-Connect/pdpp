<!doctype html>
<!-- superseded exploration — kept for history, not a DS card -->
<html lang="en" data-view="day">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280, initial-scale=1"/>
<title>PDPP // the spec as a living document</title>
<link rel="stylesheet" href="labs.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="SpecElements.jsx"></script>
<script type="text/babel" src="ThermalField.jsx"></script>
<script type="text/babel" src="TheContract.jsx"></script>
<script type="text/babel" src="LivingGrant.jsx"></script>
<script type="text/babel" src="TheAtlas.jsx"></script>
<script type="text/babel" src="ThePurposes.jsx"></script>
<script type="text/babel" src="TheSpecimen.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// Movement heading — a printed section title, like a book's part break
const Movement = ({ numeral, title, subtitle }) => (
  <div style={{ padding: '48px 64px 24px', maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '140px 1fr', gap: 48, alignItems: 'end' }}>
    <div style={{ fontFamily: 'var(--font-serif)', fontSize: 80, lineHeight: 0.9, fontWeight: 300, color: 'var(--ink-whisper)', letterSpacing: '-0.04em', fontVariationSettings: '"opsz" 144' }}>{numeral}</div>
    <div>
      <div className="gutter" style={{ marginBottom: 6 }}>{subtitle}</div>
      <div style={{ fontFamily: 'var(--font-serif)', fontSize: 42, lineHeight: 1.05, letterSpacing: '-0.02em', color: 'var(--ink)', fontVariationSettings: '"opsz" 72' }}>{title}</div>
    </div>
  </div>
);

// The centerpiece wrapper — the LivingGrant embedded with framing
const CenterpieceStage = () => (
  <section style={{ padding: '48px 64px 96px', borderBottom: '1px solid var(--rule)' }}>
    <div style={{ maxWidth: 1200, margin: '0 auto' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, alignItems: 'end', marginBottom: 40 }}>
        <div>
          <div className="gutter">§2 · THE CENTERPIECE</div>
          <h2 className="t-section" style={{ margin: '12px 0 0' }}>
            A grant is a <em>living thing</em>.
          </h2>
        </div>
        <p className="t-body" style={{ margin: 0 }}>
          Holder and issuer share one object across a thermal boundary. Drag the slider — it moves the emphasis, not the contents. The data flow on the right is real: records arrive on an interval, the cursor advances, nothing leaks past the scope.
        </p>
      </div>
      <LivingGrant />
    </div>
  </section>
);

// The closing tail — the errata and references section, like the back of a book
const Tail = () => (
  <section style={{ padding: '96px 64px 48px' }}>
    <div style={{ maxWidth: 1200, margin: '0 auto' }}>
      <Colophon />
    </div>
  </section>
);

const App = () => (
  <>
    <ThermalField />

    <Movement numeral="I" subtitle="THE FIRST MOVEMENT" title="What the protocol promises." />
    <TheContract />

    <Movement numeral="II" subtitle="THE SECOND MOVEMENT" title="What a grant actually is." />
    <CenterpieceStage />

    <Movement numeral="III" subtitle="THE THIRD MOVEMENT" title="The purposes it may serve." />
    <ThePurposes />

    <Movement numeral="IV" subtitle="THE FOURTH MOVEMENT" title="The streams it traverses." />
    <TheAtlas />

    <Movement numeral="V" subtitle="THE FIFTH MOVEMENT" title="The voice it speaks in." />
    <TheSpecimen />

    <Tail />
  </>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
