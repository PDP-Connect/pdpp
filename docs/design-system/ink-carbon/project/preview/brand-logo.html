<!doctype html>
<!-- @dsCard group="Brand" name="Brand" subtitle="Mark, wordmark, and the carbon signature" viewport="700x230" -->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>PDPP · Brand</title>
    <link href="../colors_and_type.css" rel="stylesheet">
    <link href="../ui_kits/web/kit.css" rel="stylesheet">
    <style>
    body {
      display: flex;
      gap: 34px;
      align-items: center;
      padding: 24px 26px;
      margin: 0;
      background: var(--background);
    }
    .lockup {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .mark {
      position: relative;
      width: 26px;
      height: 26px;
    }
    .mark::before {
      position: absolute;
      inset: 0;
      content: "";
      background: var(--carbon-fill);
      border: 1px solid var(--carbon-outline);
      transform: translate(6px, 6px);
    }
    .mark::after {
      position: absolute;
      inset: 0;
      content: "";
      background: var(--foreground);
    }
    .word {
      font-family: var(--font-sans);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }
    .sub {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .col {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sig {
      flex: 1;
      max-width: 300px;
    }
    .claim {
      padding: 14px 16px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
    }
    .cap {
      margin-top: 14px;
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    </style>
  </head>
  <body>
    <div class="col">
      <div class="lockup">
        <span class="mark"></span>
        <span class="word">PDPP</span>
      </div>
      <span class="sub">The sheet casting its carbon — the mark is the doctrine</span>
    </div>
    <div class="sig">
      <div class="pdpp-carbon">
        <div class="pdpp-sheet">
          <p class="claim">The protocol that always leaves you your copy.</p>
        </div>
      </div>
      <p class="cap">The carbon — the brand's one signature move</p>
    </div>
  </body>
</html>
