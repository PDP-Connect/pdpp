<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing" subtitle="4px grid — compose padding and gap from these steps" viewport="700x170" -->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>PDPP · Spacing</title>
    <link href="../colors_and_type.css" rel="stylesheet">
    <style>
    body {
      display: flex;
      gap: 14px;
      align-items: flex-end;
      padding: 22px 24px;
      margin: 0;
      background: var(--background);
    }
    .step {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }
    .bar {
      width: 30px;
      background: var(--primary-tint);
      border: 1px solid var(--primary);
    }
    .lbl {
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--muted-foreground);
    }
    </style>
  </head>
  <body>
    <div class="step">
      <div class="bar" style="height: 4px;"></div>
      <span class="lbl">4</span>
    </div>
    <div class="step">
      <div class="bar" style="height: 8px;"></div>
      <span class="lbl">8</span>
    </div>
    <div class="step">
      <div class="bar" style="height: 12px;"></div>
      <span class="lbl">12</span>
    </div>
    <div class="step">
      <div class="bar" style="height: 16px;"></div>
      <span class="lbl">16</span>
    </div>
    <div class="step">
      <div class="bar" style="height: 20px;"></div>
      <span class="lbl">20</span>
    </div>
    <div class="step">
      <div class="bar" style="height: 24px;"></div>
      <span class="lbl">24</span>
    </div>
    <div class="step">
      <div class="bar" style="height: 32px;"></div>
      <span class="lbl">32</span>
    </div>
    <div class="step">
      <div class="bar" style="height: 40px;"></div>
      <span class="lbl">40</span>
    </div>
    <div class="step">
      <div class="bar" style="height: 48px;"></div>
      <span class="lbl">48</span>
    </div>
  </body>
</html>
