<!doctype html>
<!-- @dsCard group="Components" name="Endorsements" subtitle="Status, typed by the protocol — and neutral tags" viewport="700x190" -->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>PDPP · Endorsements</title>
    <link href="../colors_and_type.css" rel="stylesheet">
    <link href="../ui_kits/web/kit.css" rel="stylesheet">
    <style>
    body {
      padding: 20px 24px;
      margin: 0;
      background: var(--background);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .lbl {
      margin-bottom: 6px;
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--muted-foreground);
    }
    </style>
  </head>
  <body>
    <div class="lbl">endorsements — state color is spent here and only here</div>
    <div class="row">
      <span class="pdpp-endorse pdpp-endorse--active">active</span>
      <span class="pdpp-endorse pdpp-endorse--continuous">continuous</span>
      <span class="pdpp-endorse pdpp-endorse--expiring">expiring 26h</span>
      <span class="pdpp-endorse pdpp-endorse--revoked">revoked</span>
      <span class="pdpp-endorse pdpp-endorse--denied">denied</span>
    </div>
    <div class="lbl">taxonomy tags — typed, no color spent</div>
    <div class="row">
      <span class="pdpp-tag">append only</span>
      <span class="pdpp-tag">owner device flow</span>
      <span class="pdpp-tag">v0.1.0</span>
      <span class="pdpp-tag">draft</span>
    </div>
  </body>
</html>
