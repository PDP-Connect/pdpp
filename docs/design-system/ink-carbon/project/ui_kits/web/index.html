<!doctype html>
<!-- old-direction kit home — pending Ink Carbon restyle, not a DS card -->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>PDPP · Web UI Kit</title>
    <meta content="width=1200, initial-scale=1" name="viewport">
    <link href="../../colors_and_type.css" rel="stylesheet">
    <link href="kit.css" rel="stylesheet">
    <style>
    .page {
      min-height: 100vh;
    }
    .section {
      max-width: var(--content-wide-width);
      padding: 0 48px;
      margin: 0 auto;
    }
    .dash-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 48px;
      padding-top: 48px;
      padding-bottom: 96px;
    }
    .side {
      position: sticky;
      top: 72px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-self: start;
      padding-right: 32px;
      border-right: 1px solid var(--border);
    }
    .side-h {
      margin-bottom: 4px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .side-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      font-size: 13.5px;
      color: var(--muted-foreground);
      cursor: pointer;
      border-radius: 6px;
    }
    .side-link.on {
      font-weight: 500;
      color: var(--foreground);
      background: var(--muted);
    }
    .side-link small {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted-foreground);
    }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .sec-title {
      margin: 40px 0 14px;
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .spec-row {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 12px;
      align-items: flex-start;
      padding: 14px 0;
      border-top: 1px solid var(--border);
    }
    .spec-row .n {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--primary);
    }
    .spec-row .t {
      font-size: 15px;
      font-weight: 600;
    }
    .spec-row .b {
      max-width: 620px;
      margin-top: 2px;
      font-size: 14px;
      line-height: 1.55;
      color: var(--muted-foreground);
    }
    </style>
  </head>
  <body>
    <div class="page" id="root"></div>

    <script
      crossorigin="anonymous"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    ></script>
    <script
      crossorigin="anonymous"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    ></script>
    <script
      crossorigin="anonymous"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    ></script>

    <script src="SiteHeader.jsx" type="text/babel"></script>
    <script src="Hero.jsx" type="text/babel"></script>
    <script src="ConsentCard.jsx" type="text/babel"></script>
    <script src="GrantInspector.jsx" type="text/babel"></script>
    <script src="StreamInventory.jsx" type="text/babel"></script>
    <script src="GrantsList.jsx" type="text/babel"></script>
    <script src="Teaching.jsx" type="text/babel"></script>

    <script type="text/babel">
const NAV_SIDE = [
  { k: 'overview', t: 'Overview', meta: '§1' },
  { k: 'consent', t: 'Consent', meta: '§2' },
  { k: 'grants', t: 'Grants', meta: '§3' },
  { k: 'streams', t: 'Streams', meta: '§4' },
  { k: 'enforce', t: 'Enforcement', meta: '§5' },
];

const App = () => {
  const [page, setPage] = React.useState('home');
  const [anchor, setAnchor] = React.useState('overview');
  return (
    <>
      <SiteHeader active={page} onNav={setPage} />
      {page === 'home' && (
        <>
          <Hero />
          <section className="section" style={{ paddingBottom: 96 }}>
            <h2 className="pdpp-display" style={{ margin: '0 0 24px' }}>The grant is the artifact.</h2>
            <p className="pdpp-body-lg" style={{ maxWidth: 680, color: 'var(--muted-foreground)', margin: '0 0 40px' }}>
              A grant names resources, fields, purpose, duration, and access mode.
              Collection is a companion mechanism, not the conceptual center.
            </p>
            <div className="two-col">
              <ConsentCard />
              <GrantInspector />
            </div>
            <div className="sec-title">How data moves</div>
            <FlowDiagram />
            <div className="sec-title">Example request</div>
            <div className="two-col">
              <CodeBlock caption="One request. The response stays inside the grant.">{`// the grant is the artifact
GET /v1/streams/pay_statements/records
Authorization: Bearer grt_longview01

200 OK
{
  "records": [
    { "employer": "Acme Co",
      "pay_period": "2025-09-16/2025-09-30",
      "gross_pay": 4812.50,
      "net_pay":   3622.18 }
  ],
  "next_cursor": null
}`}</CodeBlock>
              <div className="pdpp-surface-neutral" style={{ padding: '20px 24px' }}>
                <div className="pdpp-eyebrow">ENFORCE · §5.1</div>
                <div className="pdpp-heading" style={{ marginTop: 6 }}>Server-side boundary</div>
                <div className="spec-row"><span className="n">5.1</span><div><div className="t">Only granted fields return</div><div className="b">The resource server drops any field not declared in the grant, even if the client asks for it.</div></div></div>
                <div className="spec-row"><span className="n">5.2</span><div><div className="t">Purpose is declared, not enforced</div><div className="b">Clients commit to a purpose code. The server records it; it does not police downstream use.</div></div></div>
                <div className="spec-row"><span className="n">5.3</span><div><div className="t">Revocation is authoritative</div><div className="b">A revoked grant is a hard stop at the issuer. No further records flow, regardless of mode.</div></div></div>
              </div>
            </div>
          </section>
        </>
      )}

      {page === 'spec' && (
        <section className="section dash-grid">
          <aside className="side">
            <span className="side-h">Specification</span>
            {NAV_SIDE.map(x => (
              <div key={x.k} className={`side-link ${anchor === x.k ? 'on' : ''}`} onClick={() => setAnchor(x.k)}>
                <span>{x.t}</span><small>{x.meta}</small>
              </div>
            ))}
          </aside>
          <main>
            <div className="pdpp-eyebrow" style={{ color: 'var(--primary)' }}>PDPP · SPECIFICATION · DRAFT 3</div>
            <h1 className="pdpp-display" style={{ margin: '8px 0 16px' }}>Personal Data Portability Protocol</h1>
            <p className="pdpp-body-lg" style={{ color: 'var(--muted-foreground)', maxWidth: 680 }}>
              An open specification for how personal user data flows through the digital economy under authorization-first, purpose-bound access.
            </p>
            <div className="sec-title">1. Overview</div>
            <div className="spec-row"><span className="n">1.1</span><div><div className="t">Roles</div><div className="b">Three roles participate: the <b style={{color:'var(--human)'}}>holder</b> (the person whose data is stored), the <b style={{color:'var(--primary)'}}>issuer</b> (the server that issues grants and returns records), and the <b>client</b> (an application acting under a grant).</div></div></div>
            <div className="spec-row"><span className="n">1.2</span><div><div className="t">The grant is the artifact</div><div className="b">A grant is a signed, revocable, purpose-bound statement of what a client may read. Clients do not authenticate with bearer tokens scoped to accounts; they act under grants.</div></div></div>
            <div className="spec-row"><span className="n">1.3</span><div><div className="t">Collection is a companion</div><div className="b">Bulk collection (batched pulls, scheduled syncs) is permitted but derived from grants — never the conceptual center.</div></div></div>
            <div className="sec-title">4. Streams</div>
            <StreamInventory />
          </main>
        </section>
      )}

      {page === 'design' && (
        <section className="section" style={{ padding: '48px 48px 96px' }}>
          <div className="pdpp-eyebrow">DESIGN · REFERENCE</div>
          <h1 className="pdpp-display" style={{ margin: '8px 0 32px' }}>Your grants</h1>
          <GrantsList />
        </section>
      )}

      {(page === 'palette' || page === 'docs') && (
        <section className="section" style={{ padding: '96px 48px', textAlign: 'center' }}>
          <div className="pdpp-eyebrow">{page.toUpperCase()}</div>
          <div className="pdpp-display" style={{ marginTop: 8 }}>Placeholder page</div>
          <p className="pdpp-body" style={{ color: 'var(--muted-foreground)', marginTop: 12 }}>
            Click <b>home</b>, <b>spec</b>, or <b>design</b> in the nav to see rendered kit surfaces.
          </p>
        </section>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
  </body>
</html>
