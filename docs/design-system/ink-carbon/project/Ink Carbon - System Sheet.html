<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>PDPP — Ink Carbon, the system sheet</title>
    <link href="colors_and_type.css" rel="stylesheet">
    <style>
    body {
      padding: 34px 38px 46px;
      margin: 0;
      background: var(--background);
    }
    header {
      max-width: 760px;
      margin-bottom: 26px;
    }
    h1 {
      margin: 0;
      font-family: var(--font-sans);
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.022em;
    }
    .lede {
      margin: 10px 0 0;
      font-family: var(--font-sans);
      font-size: 14.5px;
      line-height: 1.6;
      color: var(--muted-foreground);
    }
    .lede b {
      font-weight: 600;
      color: var(--foreground);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      max-width: 1480px;
    }
    figure {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 0;
    }
    figcaption {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    iframe {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border-strong);
    }
    </style>
  </head>
  <body>
    <header>
      <h1>Ink Carbon</h1>
      <p class="lede">
        The committed PDPP design system. <b>The carbon duplicate</b> marks what the server retains for you;
        <b>the typed voice</b>
        separates what the protocol writes from what humans read; <b>color is spent</b>, never sprayed;
        <b>paper is square</b>. Full doctrine in README.md — these are the live cards.
      </p>
    </header>
    <div class="grid">
      <figure>
        <figcaption>Brand</figcaption>
        <iframe src="preview/brand-logo.html" style="height: 230px;" title="Brand"></iframe>
      </figure>

      </figure>

      </figure>
      <figure>

        <iframe src="preview/components-badges.html" style="height: 190px;" title="Endorsements"></iframe>
      </figure>
      <figure>

      </figure>
      <figure>

      <figure>

</html>
