<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Row calibration harness — real components.css</title>
<!-- The REAL brand tokens + the REAL (edited) Explore CSS, copied from the worktree.
     This renders exactly what will deploy, so the screenshot is authoritative. -->
<link rel="stylesheet" href="./base.css" />
<link rel="stylesheet" href="./components.css" />
<style>
  /* Page chrome only — NOT part of the deployed CSS. A neutral card to host the feed
     at the real list width, matching the 2-pane Explore layout's feed column. */
  body { background: var(--background); padding: 32px; }
  .harness-feed { width: 560px; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-control, 8px); padding: 0 20px; }
  .harness-label { font: 600 12px var(--font-sans); color: var(--muted-foreground);
    text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 12px 4px; }
</style>
</head>
<body>
  <p class="harness-label">Explore feed — row + day-header calibration (#148)</p>
  <div class="harness-feed">

    <!-- R5 saved-view tabs (#149): [All] [user-saved] [+ Save]. Here the "Deploys"
         tab is the active view (shows the mono count); others show no count. -->
    <div class="rr-x-views-tabs" role="tablist" aria-label="Saved views">
      <button class="rr-x-views-tab" role="tab" type="button">
        <span class="rr-x-views-tab__name">All</span>
      </button>
      <span class="rr-x-views-tab-wrap">
        <button class="rr-x-views-tab is-active" role="tab" type="button" aria-selected="true">
          <span class="rr-x-views-tab__name">Deploys</span>
          <span class="rr-x-views-tab__count">32</span>
        </button>
        <button class="rr-x-views-tab__del" type="button" aria-label="Delete saved view Deploys">×</button>
      </span>
      <span class="rr-x-views-tab-wrap">
        <button class="rr-x-views-tab" role="tab" type="button">
          <span class="rr-x-views-tab__name">Slack — linux-vana</span>
        </button>
        <button class="rr-x-views-tab__del" type="button" aria-label="Delete saved view Slack">×</button>
      </span>
      <button class="rr-x-views-tab rr-x-views-tab--save" type="button">+ Save view</button>
    </div>

    <div class="rr-x-days">

      <div class="rr-x-day">
        <div class="rr-x-day__head">
          <span class="rr-x-day__label">Today · Jun 23</span>
          <span class="rr-x-day__n">8 <span class="rr-x-day__inview">in view</span></span>
        </div>

        <!-- A content-led row with a snippet (selected) -->
        <div class="rr-x-row-wrap rr-x-row-wrap--desktop">
          <button class="rr-x-row rr-x-row--desktop is-selected" data-selected="true">
            <span class="rr-x-row__glyph" data-kind="message">◍</span>
            <span class="rr-x-row__body">
              <span class="rr-x-row__title">Should we deploy a separate Modal function per user or force deployments?</span>
              <span class="rr-x-row__meta">
                <span class="rr-x-row__snippet">
                  <span class="rr-x-role">message</span>
                  <span class="rr-x-row__snippet-text">…leaning toward one shared function with per-user routing…</span>
                </span>
                <span class="rr-x-row__attr">
                  <span class="rr-x-row__stream">messages</span>
                  <span class="rr-x-row__con">Claude Code — personal</span>
                  <span class="rr-x-row__rel">lexical</span>
                </span>
              </span>
            </span>
            <span class="rr-x-row__time">10:34 PM</span>
            <span class="rr-x-row__action">inspect</span>
          </button>
        </div>

        <!-- A plain content row -->
        <div class="rr-x-row-wrap rr-x-row-wrap--desktop">
          <button class="rr-x-row rr-x-row--desktop">
            <span class="rr-x-row__glyph" data-kind="generic">◇</span>
            <span class="rr-x-row__body">
              <span class="rr-x-row__title">PDPP sits above OAuth and Rich Authorization Requests</span>
              <span class="rr-x-row__meta">
                <span class="rr-x-row__attr">
                  <span class="rr-x-row__stream">documents</span>
                  <span class="rr-x-row__con">Notion — Vana</span>
                </span>
              </span>
            </span>
            <span class="rr-x-row__time">9:01 PM</span>
            <span class="rr-x-row__action">inspect</span>
          </button>
        </div>

        <!-- A neutral/derived-title row (honest fallback) -->
        <div class="rr-x-row-wrap rr-x-row-wrap--desktop">
          <button class="rr-x-row rr-x-row--desktop">
            <span class="rr-x-row__glyph" data-kind="generic">◇</span>
            <span class="rr-x-row__body">
              <span class="rr-x-row__title is-derived">acct_8f3a91c2-budget-month</span>
              <span class="rr-x-row__meta">
                <span class="rr-x-row__attr">
                  <span class="rr-x-row__stream">budget_months</span>
                  <span class="rr-x-row__con">YNAB — personal</span>
                </span>
              </span>
            </span>
            <span class="rr-x-row__time">4:12 PM</span>
            <span class="rr-x-row__action">inspect</span>
          </button>
        </div>
      </div>

      <div class="rr-x-day">
        <div class="rr-x-day__head">
          <span class="rr-x-day__label">Yesterday · Jun 22</span>
          <span class="rr-x-day__n">23 <span class="rr-x-day__inview">in view</span></span>
        </div>

        <div class="rr-x-row-wrap rr-x-row-wrap--desktop">
          <button class="rr-x-row rr-x-row--desktop">
            <span class="rr-x-row__glyph" data-kind="message">◍</span>
            <span class="rr-x-row__body">
              <span class="rr-x-row__title">Hi Tim! There's a Linux Foundation review on the calendar</span>
              <span class="rr-x-row__meta">
                <span class="rr-x-row__attr">
                  <span class="rr-x-row__stream">messages</span>
                  <span class="rr-x-row__con">Slack — linux-vana</span>
                </span>
              </span>
            </span>
            <span class="rr-x-row__time">1:01 PM</span>
            <span class="rr-x-row__action">inspect</span>
          </button>
        </div>

        <div class="rr-x-row-wrap rr-x-row-wrap--desktop">
          <button class="rr-x-row rr-x-row--desktop">
            <span class="rr-x-row__glyph" data-kind="generic">◇</span>
            <span class="rr-x-row__body">
              <span class="rr-x-row__title">2026 Vana Corporate Strategy</span>
              <span class="rr-x-row__meta">
                <span class="rr-x-row__attr">
                  <span class="rr-x-row__stream">files</span>
                  <span class="rr-x-row__con">Google Drive — work</span>
                </span>
              </span>
            </span>
            <span class="rr-x-row__time">11:20 AM</span>
            <span class="rr-x-row__action">inspect</span>
          </button>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
