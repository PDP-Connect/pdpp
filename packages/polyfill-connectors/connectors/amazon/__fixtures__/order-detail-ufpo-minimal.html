<!doctype html>
<html>
  <body>
    <div id="ufpo-od-main-section" class="a-section ufpo-order-details-page-only">
      <div id="ufpo-order-status-container" class="a-section a-spacing-top-base">
        <h2 id="ufpo-order-status-primary">Delivered today</h2>
        <span id="ufpo-order-status-secondary">Arrived during the selected window</span>
      </div>
    </div>
    <div class="a-row ufpo-item-list-table" role="presentation">
      <div id="B01UFPO001-item-grid-row" class="a-row a-spacing-top-base a-grid-vertical-align a-grid-center" role="row">
        <div class="a-column a-span1 ufpo-item-image-column" role="gridcell">
          <img src="https://example.com/ufpo-a.jpg" alt="Example item A" />
        </div>
        <div class="a-column a-span11 a-span-last" role="presentation">
          <div class="a-row a-spacing-small a-spacing-top-small a-grid-vertical-align a-grid-center" role="presentation">
            <div class="a-column a-span6" role="gridcell">
              <a class="a-link-normal a-text-normal" href="/gp/product/B01UFPO001?ref_=uff_od_product">
                Fictional Grocery Apples
              </a>
            </div>
            <div class="a-column a-span1 a-text-center" role="gridcell">1</div>
            <div class="a-column a-span3 a-text-center ufpo-item-weight-column" role="gridcell">
              <span id="B01UFPO001-item-priced-by-quantity">$3.00</span>
            </div>
            <div class="a-column a-span2 a-text-left a-span-last" role="gridcell">
              <span id="B01UFPO001-item-total-price">$3.00</span>
            </div>
          </div>
          <div class="a-row a-spacing-micro a-grid-vertical-align a-grid-center" role="presentation">
            <div class="a-column a-span8" role="gridcell"></div>
            <div class="a-column a-span4 ufpo-item-status-column a-span-last" role="gridcell">
              <div class="a-box ufpo-item-status">Delivered</div>
            </div>
          </div>
        </div>
      </div>
      <div id="B02UFPO002-item-grid-row" class="a-row a-spacing-top-base a-grid-vertical-align a-grid-center" role="row">
        <div class="a-column a-span1 ufpo-item-image-column" role="gridcell">
          <img src="https://example.com/ufpo-b.jpg" alt="Example item B" />
        </div>
        <div class="a-column a-span11 a-span-last" role="presentation">
          <div class="a-row a-spacing-small a-spacing-top-small a-grid-vertical-align a-grid-center" role="presentation">
            <div class="a-column a-span6" role="gridcell">
              <a class="a-link-normal a-text-normal" href="/dp/B02UFPO002?ref_=uff_od_product">
                Fictional Grocery Peaches
              </a>
            </div>
            <div class="a-column a-span1 a-text-center" role="gridcell">2</div>
            <div class="a-column a-span3 a-text-center ufpo-item-weight-column" role="gridcell"></div>
            <div class="a-column a-span2 a-text-left a-span-last" role="gridcell">
              <span id="B02UFPO002-item-total-price">$6.00</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <dl class="a-definition-list a-vertical ufpo-order-summary-list ufpo-charge-breakdown">
      <div class="a-row">
        <div class="a-column a-span8 a-text-left"><dt class="a-list-item"><span>Items subtotal</span></dt></div>
        <div class="a-column a-span4 a-text-right a-span-last"><dd class="a-list-item"><span>$9.00</span></dd></div>
      </div>
      <div class="a-row">
        <div class="a-column a-span8 a-text-left"><dt class="a-list-item"><span class="a-text-bold">Total</span></dt></div>
        <div class="a-column a-span4 a-text-right a-span-last"><dd class="a-list-item"><span class="a-text-bold">$10.50</span></dd></div>
      </div>
    </dl>
  </body>
</html>
