version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      github-actions-security:
        applies-to: security-updates

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      npm-security:
        applies-to: security-updates
    # Major bumps are excluded from the group above, so each lands in its own
    # PR that can be reviewed and tested in isolation.

  - package-ecosystem: docker
    directories:
      - /
      - /apps/site
      - /apps/console
      - /docker/neko
    schedule:
      interval: weekly
    groups:
      docker-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      docker-security:
        applies-to: security-updates
