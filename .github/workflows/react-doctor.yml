name: react-doctor

# Regression-only React health check on the Next.js apps (site + console).
#
# Why regression-only: the existing apps have an established baseline of
# React Doctor diagnostics. We do not gate on an absolute floor; we only fail
# when a PR introduces *new* findings against main. Owner can promote to a
# score floor later once the baseline is paid down.
#
# Path filter covers both apps/site (public site + sandbox) and apps/console
# (operator dashboard) because both are React surfaces produced by the
# split-public-site-and-operator-console migration.

on:
  pull_request:
    paths:
      - "apps/site/**"
      - "apps/console/**"
      - ".github/workflows/react-doctor.yml"
  workflow_dispatch: {}

concurrency:
  group: react-doctor-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  react-doctor:
    name: regression scan vs main
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run React Doctor (changed PR files)
        uses: millionco/react-doctor@v1
        with:
          fail-on: warning
          annotations: true
