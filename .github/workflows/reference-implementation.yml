name: reference-implementation

# Path-scoped CI for the reference AS/RS, runtime, CLI, and contract boundary.
# This catches regressions before release/docker-image workflows and keeps the
# load-bearing reference implementation under the same review discipline as the
# connector and package workspaces.
#
# The apps/console/** trigger is here because two integration tests in the
# reference suite (composed-origin.test.js, dashboard-proxy-redirect.test.js)
# build apps/console and spawn its standalone server to exercise the
# dashboard/BFF/proxy. The apps/site/** trigger is here because the RS/dataset
# import-boundary tests read the public sandbox source from apps/site/src/app/
# sandbox/**. Both were retargeted from the legacy apps/web app by the
# split-public-site-and-operator-console migration; the triggers moved with them.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/reference-implementation.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/console/**"
      - "apps/site/**"
      - "packages/reference-contract/**"
      - "reference-implementation/**"
  pull_request:
    paths:
      - ".github/workflows/reference-implementation.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "apps/console/**"
      - "apps/site/**"
      - "packages/reference-contract/**"
      - "reference-implementation/**"
  workflow_dispatch: {}

concurrency:
  group: reference-implementation-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: typecheck + full test suite
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        env:
          PATCHRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: pnpm install --frozen-lockfile

      - name: Typecheck reference implementation
        run: pnpm --dir reference-implementation run typecheck

      - name: Test reference implementation
        env:
          PDPP_TEST_CONCURRENCY: "2"
        run: pnpm --dir reference-implementation run test
