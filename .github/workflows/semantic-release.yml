name: semantic-release

on:
  push:
    branches: [beta]
  workflow_dispatch: {}

concurrency:
  group: semantic-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-version:
    name: resolve next version
    if: github.ref == 'refs/heads/beta'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    outputs:
      new-release-published: ${{ steps.version.outputs.new-release-published }}
      new-release-version: ${{ steps.version.outputs.new-release-version }}
      new-release-git-tag: ${{ steps.version.outputs.new-release-git-tag }}
      new-release-major-minor: ${{ steps.version.outputs.new-release-major-minor }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        env:
          PATCHRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: pnpm install --frozen-lockfile

      - name: Determine next version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          pnpm exec semantic-release --dry-run 2>&1 | tee "$RUNNER_TEMP/semantic-release-dry-run.log"
          node scripts/semantic-release-github-output.mjs dry-run "$RUNNER_TEMP/semantic-release-dry-run.log"

  quality:
    name: release quality checks
    needs: resolve-version
    if: needs.resolve-version.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        env:
          PATCHRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: pnpm install --frozen-lockfile

      - name: Verify generated reference contract
        run: pnpm reference-contract:check-generated

      - name: Verify reference implementation
        run: pnpm --dir reference-implementation run verify

      - name: Check spec docs drift
        run: pnpm spec:check

      - name: Typecheck web app
        run: pnpm --dir apps/web run types:check

      - name: Verify CLI package
        run: pnpm --filter @pdpp/cli run verify

  validate-release-images:
    name: validate release image ${{ matrix.image }}
    needs: resolve-version
    if: needs.resolve-version.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: reference
            target: reference
            title: PDPP reference AS/RS
            description: PDPP reference authorization server and resource server
          - image: web
            target: web
            title: PDPP reference web
            description: PDPP browser-facing reference dashboard and docs

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute image name
        env:
          IMAGE_NAME: ${{ matrix.image }}
        run: |
          echo "PDPP_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/${IMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PDPP_IMAGE }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.resolve-version.outputs.new-release-version }}
          tags: |
            type=raw,value=${{ needs.resolve-version.outputs.new-release-version }}
            type=raw,value=beta
            type=sha,prefix=sha-

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha,scope=${{ matrix.target }}-release
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-release
          context: .
          file: ./Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          target: ${{ matrix.target }}

  release:
    name: publish GitHub and npm release
    # Package publishing must not be blocked by release-image validation. Image
    # publication remains separately gated on successful validation below.
    needs: [resolve-version, quality]
    if: needs.resolve-version.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    outputs:
      published: ${{ steps.semantic-release.outputs.new-release-published }}
      version: ${{ steps.semantic-release.outputs.new-release-version }}
      git-tag: ${{ steps.semantic-release.outputs.new-release-git-tag }}
      major-minor: ${{ steps.semantic-release.outputs.new-release-major-minor }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        env:
          PATCHRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release

  publish-images:
    name: publish release image ${{ matrix.image }}
    needs: [release, validate-release-images]
    if: needs.release.outputs.published == 'true' && needs.validate-release-images.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: reference
            target: reference
            title: PDPP reference AS/RS
            description: PDPP reference authorization server and resource server
          - image: web
            target: web
            title: PDPP reference web
            description: PDPP browser-facing reference dashboard and docs

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute image name
        env:
          IMAGE_NAME: ${{ matrix.image }}
        run: |
          echo "PDPP_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/${IMAGE_NAME}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PDPP_IMAGE }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
          tags: |
            type=raw,value=${{ needs.release.outputs.version }}
            type=raw,value=beta
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha,scope=${{ matrix.target }}-release
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-release
          context: .
          file: ./Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          push: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          target: ${{ matrix.target }}
