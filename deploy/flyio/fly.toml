# fly.toml — PDPP Core app on Fly.io
#
# The selected Fly target is one public Core app plus Fly Postgres. The app runs
# the console on Fly's public port and the reference AS/RS listeners on loopback.
#
# Pass this file explicitly:
#   fly launch --config deploy/flyio/fly.toml ...
#   fly deploy --config deploy/flyio/fly.toml
#
# Before deploying, set the required secrets:
#   fly secrets set PDPP_OWNER_PASSWORD="$(openssl rand -base64 24)"
#   fly secrets set PDPP_REFERENCE_ORIGIN="https://<app-name>.fly.dev"
#   fly launch --db injects DATABASE_URL automatically.
#
# See deploy/flyio/README.md for the full first-deploy walkthrough.

app = "pdpp-core"       # Replace with your chosen app name
primary_region = "iad"  # Replace with your preferred region

[build]
  dockerfile = "Dockerfile"
  target = "platform-core"

[env]
  NODE_ENV = "production"
  # Public origin, owner password, and durable database URL are set as secrets
  # or attached variables, not baked into fly.toml.

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/.well-known/oauth-authorization-server"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
