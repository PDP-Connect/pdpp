# fly.reference.toml — PDPP Core reference app (private)
#
# This is the private Fly app: the Authorization Server (port 7662) and
# Resource Server (port 7663) in one Node process. It has NO public service
# block; it is reachable only over Fly's private WireGuard network at
# <app-name>.internal from the console app.
#
# Deploy: `fly deploy --config deploy/flyio/fly.reference.toml --app <reference-app-name>`
#
# Before deploying, set the required secrets on this app:
#   fly secrets set --app <reference-app-name> PDPP_OWNER_PASSWORD="<same-as-console>"
#   fly secrets set --app <reference-app-name> PDPP_DATABASE_URL="<postgres-connection-string>"
#   fly secrets set --app <reference-app-name> PDPP_REFERENCE_ORIGIN="https://<console-app-name>.fly.dev"
#
# See deploy/flyio/README.md for the full first-deploy walkthrough.

app = "pdpp-reference"     # Replace with your chosen app name (used in *.internal DNS)
primary_region = "iad"     # Must match the console app's region for lowest latency

[build]
  dockerfile = "Dockerfile"
  target = "reference"
  # The reference stage is the browser-free AS/RS runtime. Fly's fly.toml
  # supports [build] target, so no separate reference.Dockerfile is needed
  # (unlike the Railway path which requires one due to schema limitations).

[env]
  NODE_ENV = "production"
  PORT = "7662"
  AS_PORT = "7662"
  RS_PORT = "7663"
  PDPP_RS_URL = "http://127.0.0.1:7663"
  PDPP_EMBEDDING_DOWNLOAD_ALLOWED = "0"
  PDPP_REFERENCE_OPERATIONAL_DEFAULTS = "1"
  # PDPP_REFERENCE_ORIGIN, PDPP_OWNER_PASSWORD, and PDPP_DATABASE_URL are
  # set as secrets (fly secrets set ...) not baked into fly.toml.

# No [http_service] or [[services]] block: this app is private-only.
# It is reachable at <app-name>.internal:7662 and <app-name>.internal:7663
# over the Fly WireGuard private network.

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
