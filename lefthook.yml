# Pre-commit gates.
#
# The floor is enforced by tooling, not review. If anything fails, the commit
# is rejected — no "just this once" escape. Speed matters (< 3s for the common
# case), so jobs run in parallel and most are scoped to staged files.
#
# `{staged_files}` is a list of staged paths RELATIVE TO THE REPO ROOT.
# Invoke tools from the repo root and let them discover their own config.

pre-commit:
  parallel: true
  jobs:
    # Auto-format + fix safe lints on staged .ts / config files. Anything
    # Biome can repair (quote style, whitespace, sort imports, useLiteralKeys,
    # etc.) is repaired in-place. stage_fixed=true writes the fixes back
    # into the index so the commit picks them up. Changes that aren't
    # auto-fixable fall through to the :lint job below and fail the commit.
    - name: polyfill-connectors:format
      glob: "packages/polyfill-connectors/**/*.{ts,jsonc,json}"
      root: "packages/polyfill-connectors"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    # Lint .ts + config files (no-write; the format job already applied
    # safe fixes). Reports anything still violating rules after auto-fix.
    - name: polyfill-connectors:lint
      glob: "packages/polyfill-connectors/**/*.{ts,jsonc,json}"
      root: "packages/polyfill-connectors"
      run: pnpm exec biome check --no-errors-on-unmatched {staged_files}

    # Type-check runs on the whole package, not just staged files, because
    # a change in one file can break types in another.
    - name: polyfill-connectors:typecheck
      glob: "packages/polyfill-connectors/**/*.{ts,js}"
      run: pnpm --dir packages/polyfill-connectors run typecheck

    - name: polyfill-connectors:no-double-cast
      # Biome/Ultracite has no equivalent to typescript-eslint's
      # consistent-type-assertions yet. Grep for `as unknown as X` as a
      # stop-gap until that rule lands upstream.
      glob: "packages/polyfill-connectors/**/*.ts"
      run: |
        if grep -nE "as[[:space:]]+unknown[[:space:]]+as[[:space:]]" {staged_files}; then
          echo "✗ Found 'as unknown as X' double-cast — narrow the type properly instead."
          exit 1
        fi
