why_this_matters: "normalizeWindowSelector (cc15, scope-fn red_scan empty — the file's field_not_granted marker lives in a SIBLING grant-check, not in this body) resolves a read-record-field window request into either an offset-mode or a query-mode selector. It braids the mutual-exclusion parameter validation, the offset-mode early return, and a substantial query-mode assembly (non-empty-q guard, before/after context-char parsing, explicit-context-aware requested-limit computation, MAX clamp, and the query-mode result object). The query-mode assembly is a self-contained sub-computation given (params, boundedLimit, limitClamped). Extracting it into a named pure helper removes that branch's whole body from the entry function, cutting ~8 cc while every invalid_window error and the limit/clamp arithmetic stay byte-identical. Pure function, no grant enforcement in scope."
plan:
  transform_class: extract-query-mode-builder
  instruction: "In server/record-field-window.js ONLY. Create ONE module-level (column-0) pure named function ABOVE normalizeWindowSelector:\n\nfunction buildQueryModeWindow(params, boundedLimit, limitClamped) — returns the query-mode selector object. Contains VERBATIM the query branch currently at L138-160 (everything AFTER the `if (!hasQParam) { return {...}; }` early return): the non-empty-q guard (`if (typeof params.q !== 'string' || params.q.length === 0) throw fieldWindowError('invalid_window', 'q must be a non-empty string', 400);`), the `before = assertContextChars(params.before_chars, 'before_chars')` / `after = assertContextChars(params.after_chars, 'after_chars')` lines, `explicitContext`, the `requestedLimit` ternary, `effectiveLimit = Math.min(requestedLimit, FIELD_WINDOW_MAX_LIMIT)`, and the returned `{ mode: 'query', query: params.q, before, after, offset: 0, limit: effectiveLimit, limitClamped: limitClamped || requestedLimit > FIELD_WINDOW_MAX_LIMIT }`. fieldWindowError, assertContextChars, FIELD_WINDOW_DEFAULT_LIMIT, FIELD_WINDOW_MAX_LIMIT are module-scope — reference directly.\n\nSEAM MECHANISM (explicit): buildQueryModeWindow takes THREE explicit parameters whose NAMES equal the caller's locals — params, boundedLimit, limitClamped — so normalizeWindowSelector delegates with bare identifiers. normalizeWindowSelector keeps: the two mutual-exclusion guards, the `clampWindowBounds({ offsetChars: params.offset_chars, limitChars: params.limit_chars })` destructure, the `if (!hasQParam) return { mode: 'offset', offset, limit: boundedLimit, limitClamped };` early return, and finally `return buildQueryModeWindow(params, boundedLimit, limitClamped);`.\n\nHARD PRESERVE: the mutual-exclusion guards (before/after require q; q exclusive with offset_chars) with exact messages/400, the clampWindowBounds call arguments, the offset-mode return shape, and — inside the extracted helper — the exact requestedLimit ternary (explicitContext ? before + params.q.length + after : FIELD_WINDOW_DEFAULT_LIMIT vs boundedLimit), the Math.min clamp, and the limitClamped OR expression. NO change to clampWindowBounds. NO new module file, NO behavior change."
