why_this_matters: "normalizeInsert (cc16, scope-fn red_scan empty) validates a manual-upload artifact insert then builds the persisted row. It braids two concerns: REQUIRED-FIELD + status-enum VALIDATION (five presence guards plus a VALID_STATUSES membership check, each with a distinct thrown Error) and ROW CONSTRUCTION (the defaulted object literal). Separating validation from construction is a genuine concern split: extracting the guard cluster into a named pure assert helper leaves normalizeInsert as a straight builder, cutting the branch count while every Error message and default stays byte-identical. Pure function, no I/O, no grant/consent."
plan:
  transform_class: extract-validation-guard
  instruction: "In server/stores/manual-upload-artifact-store.ts ONLY. Create ONE module-level (column-0) pure named function ABOVE normalizeInsert:\n\nfunction assertManualUploadArtifactInsert(record) — throws on invalid input, returns nothing. Contains VERBATIM the six guards currently at the top of normalizeInsert (L60-67): `if (!record.artifactId) throw new Error('artifactId is required.'); if (!record.ownerSubjectId) throw new Error('ownerSubjectId is required.'); if (!record.connectorId) throw new Error('connectorId is required.'); if (!record.fileName) throw new Error('fileName is required.'); if (!record.stagingPath) throw new Error('stagingPath is required.'); if (!VALID_STATUSES.has(record.status ?? 'uploaded')) { throw new Error(\\`Invalid manual upload artifact status '${record.status}'.\\`); }`. VALID_STATUSES is module-scope — reference directly.\n\nSEAM MECHANISM (explicit): assertManualUploadArtifactInsert takes ONE explicit parameter named `record` (== the caller's parameter identifier), so normalizeInsert delegates with a bare identifier: its body becomes `assertManualUploadArtifactInsert(record); const now = record.now ?? new Date().toISOString(); return { ...the existing object literal unchanged... };`.\n\nHARD PRESERVE: the exact order of the six guards (artifactId, ownerSubjectId, connectorId, fileName, stagingPath, then status), every Error message byte-for-byte (including the status template literal with `record.status` interpolation), the `record.status ?? 'uploaded'` default in the membership check, the `const now = record.now ?? new Date().toISOString();` line staying in normalizeInsert AFTER the assert, and the ENTIRE returned object literal with its exact keys, `?? null`/`?? 0` defaults, stringifyJson(record.validation)/stringifyJson(record.error) calls, and createdAt/updatedAt = ?? now. NO new module file, NO behavior change."
