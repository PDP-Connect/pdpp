why_this_matters: "codeToStatus in server/routes/ref-error-status.ts is the SINGLE SOURCE OF TRUTH for the HTTP status every public typed-error envelope advertises (b-contract-inventory-2026-07-01.md §3 enumerates all 47 codes across 400/401/403/404/409/410/422/425/500). The existing ref-error-status.test.js pins only a SUBSET by name (ambiguous_connection, connection_not_found, insufficient_scope, cursor_expired, blob_not_found, the grant/auth cluster, a few others) and never asserts COMPLETENESS. A grep of test/ for the zero-covered codes confirms owner_subject_required (0), query_not_found (0), unsupported_version (0), invalid_record (1 incidental), invalid_record_identity (1), connector_instance_selector_required (1), connector_instance_not_revoked (1), connector_instance_store_required (1) have no by-name status assertion. A mutation that changed the status of any uncovered code (e.g. field_not_text 422->400, provider_pressure_cooldown 425->500, owner_subject_required 400->500) OR dropped a code entirely (making callers default to 500) would ship a wrong public status with no failing test. This packet pins the ENTIRE table as an exact expected map plus a count assertion, so any add/remove/restatus mutation is caught. Pure no-DB oracle."
plan:
  transform_class: add-full-table-completeness-oracle
  instruction: "Create test/ref-error-status-completeness-oracle.test.js (NEW file; touch no source). Import { codeToStatus } from '../server/routes/ref-error-status.ts'. Define a local EXPECTED object literal mapping every one of the 47 codes to its status EXACTLY as enumerated in b-contract-inventory-2026-07-01.md §3 (403 cluster: grant_stream_not_allowed, grant_expired, grant_revoked, grant_consumed, grant_invalid, field_not_granted, insufficient_scope, connector_instance_owner_mismatch; 400 cluster: invalid_field_path, invalid_window, invalid_argument, invalid_cursor, invalid_request, invalid_client, invalid_client_metadata, connector_invalid, invalid_record, invalid_record_identity, invalid_expand, invalid_sort, ambiguous_connector_instance, connector_instance_connector_mismatch, connector_instance_inactive, connector_instance_selector_required, owner_subject_required, unknown_field, unsupported_version, invalid_status; 401: authentication_error; 404: connection_not_found, field_not_found, query_not_found, blob_not_found, connector_instance_not_found, not_found; 409: ambiguous_connection, ambiguous_schema_detail, connection_run_active, default_account_delete_unsupported, connector_instance_not_revoked, run_already_active, no_pending_interaction, interaction_id_mismatch; 410: cursor_expired; 422: field_not_text; 425: provider_pressure_cooldown; 500: connector_instance_store_required). Assert: (a) for every [code,status] in EXPECTED, codeToStatus[code] === status (a loop that names each mismatch); (b) Object.keys(codeToStatus).sort() deepEqual Object.keys(EXPECTED).sort() — no code added or removed vs the pinned contract; (c) Object.keys(codeToStatus).length === 47. This makes ANY status change, addition, or deletion fail by name. node:assert/strict. NOTE: if the real table legitimately differs from the inventory (a code count != 47 at HEAD), the maker must reconcile EXPECTED to the ACTUAL committed table and record the reconciliation in a comment — the test pins the committed contract, and the count/keys assertions are what make future drift fail; do NOT edit source to match the inventory."
