  instruction: "In server/package-rs-client.js ONLY. Create ONE module-level (column-0) pure named function ABOVE mergeSearchEnvelopes:\n\nfunction placeSearchHitsInEnvelope(baseBody, limitedHits, totalScanned) — its body is the VERBATIM five-way container placement currently at L704-715, moved unchanged: `if (Array.isArray(baseBody.data)) { baseBody.data = limitedHits; } else if (baseBody.data && typeof baseBody.data === 'object' && Array.isArray(baseBody.data.data)) { baseBody.data = { ...baseBody.data, data: limitedHits }; } else if (baseBody.data && typeof baseBody.data === 'object' && Array.isArray(baseBody.data.results)) { baseBody.data = { ...baseBody.data, results: limitedHits }; if (totalScanned > 0) baseBody.data.scanned = totalScanned; } else if (Array.isArray(baseBody.results)) { baseBody.results = limitedHits; } else { baseBody.data = { results: limitedHits }; }`. It mutates the passed-in baseBody in place and returns nothing (no-return form — match the in-place mutation the original does).\n\nBODY-SHAPE MANDATE (this is the whole point of the successor — do NOT paraphrase the branch): the helper body must be the if / else if / else if / else if / else chain VERBATIM. It must NOT be reshaped into an array of handler closures, a table of predicates, .forEach / .find / .some / .map over a fns list, a switch, or any early-return-loop dispatch. The 2026-07-05 first attempt did exactly that closures-array reshape and it correctly FAILED file-excess (complexity moved into the new function, not reduced) and confused the judge — the seam-body-pin rung below FAILS that shape and PASSES only the verbatim chain.\n\nSEAM MECHANISM (explicit): placeSearchHitsInEnvelope takes THREE explicit parameters whose NAMES ARE the caller's closure identifiers — baseBody, limitedHits, totalScanned — so the call site reads `placeSearchHitsInEnvelope(baseBody, limitedHits, totalScanned);` with bare identifiers, no closure capture. The helper mutates baseBody exactly as the inline