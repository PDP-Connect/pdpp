why_this_matters: "The RS-substrate half of the read_record_field guard rails lives in record-field-window.js as pure functions the DB-backed substrate test never asserts at their boundaries (ZERO mutation-kill evidence per prior analysis). Genuinely-unpinned: normalizeWindowSelector q-exclusivity (before_chars/after_chars require q -> invalid_window; q exclusive with offset_chars -> invalid_window; q must be a non-empty string -> invalid_window) and the context ceiling assertContextChars (> 8192 -> invalid_window naming the label); assertFieldPath NUL rejection (a field containing \\u0000 -> invalid_field_path, the anti-smuggling guard) and empty/non-string rejection; classifyFieldType mapping (text/string->string, integer/real/number->number, true/false/boolean->boolean, null->null, object->object, array->array, null/undefined->absent, else->other) which decides string-vs-nonstring; assertReadableStringField pure boundary (absent -> field_not_found 404, non-string -> field_not_text 422, string -> no throw). Each throw carries a code+httpStatus that the route maps to HTTP verbatim; a mutation to any status or guard ships a wrong public error with no failing test. Fast no-DB oracle."
plan:
  transform_class: add-pure-fn-selector-oracle
  instruction: "Create test/record-field-window-selector-oracle.test.js (NEW file; touch no source). Import { normalizeWindowSelector, assertFieldPath, classifyFieldType, assertReadableStringField, FIELD_WINDOW_MAX_CONTEXT_CHARS, FIELD_WINDOW_DEFAULT_LIMIT } from '../server/record-field-window.js' (pure, no DB). For each throwing case use assert.throws with a matcher asserting err.code AND err.httpStatus (the route maps both). Pin: (1) normalizeWindowSelector({ before_chars: 10 }) throws code invalid_window httpStatus 400 (message 'before_chars and after_chars require q'); (2) normalizeWindowSelector({ q:'x', offset_chars: 5 }) throws invalid_window 400 ('q is exclusive with offset_chars'); (3) normalizeWindowSelector({ q:'' }) throws invalid_window 400 ('q must be a non-empty string'); (4) normalizeWindowSelector({ q:'x', before_chars: FIELD_WINDOW_MAX_CONTEXT_CHARS + 1 }) throws invalid_window 400 (context ceiling, message includes 'before_chars' and '<= 8192'); (5) a valid offset selector normalizeWindowSelector({ offset_chars: 4, limit_chars: 100 }) -> { mode:'offset', offset:4, limit:100 } and a valid query selector normalizeWindowSelector({ q:'foo', before_chars:10, after_chars:20 }) -> mode:'query', before:10, after:20, limit === 10+3+20 (explicit-context sum); (6) assertFieldPath('a\\u0000b') throws invalid_field_path 400 ('must not contain NUL'); assertFieldPath('') and assertFieldPath(123) throw invalid_field_path 400; assertFieldPath('body') does NOT throw; (7) classifyFieldType table: 'text'->'string','string'->'string','integer'->'number','real'->'number','number'->'number','true'->'boolean','false'->'boolean','boolean'->'boolean','null'->'null','object'->'object','array'->'array',null->'absent',undefined->'absent','weird'->'other'; (8) assertReadableStringField('f','absent') throws field_not_found 404; assertReadableStringField('f','object') throws field_not_text 422; assertReadableStringField('f','number') throws field_not_text 422; assertReadableStringField('f','string') does NOT throw. node:assert/strict."
