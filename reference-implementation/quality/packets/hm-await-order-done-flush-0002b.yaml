ses it, keep the event loop alive until 'end' fires, and write the EOF sentinel SYNCHRONOUSLY (fs.writeFileSync) inside the 'end' handler before exiting 0 — reuse the working connector-side pattern from test/runtime-pipe-resilience.test.js. The RS stub HOLDS the DONE-flush ingest response; the test releases it only after observing 'ingest:request' plus a hold window generous enough for pipe-EOF delivery (~200ms) — the hold is MUTANT-DETECTION only, never green-path synchronization: on unmutated code the ordering is enforced by the await itself and is hold-length-independent (this is why the wall-clock ban does not apply to the hold). The test folds 'eof:observed' into the shared log when the sentinel appears. MANDATORY named test (exactly): 'DONE(succeeded) arm: every ingest POST completes before the connector observes stdin EOF' asserting index(ingest:completed) < index(eof:observed), and additionally that the runConnector outcome does not settle before 'ingest:completed' is logged. Kill mechanics: under the seeded mutation (await dropped from flushAll() at :3553) proc.stdin.end() fires in the same tick as the un-awaited flushAll call, the child observes EOF during the hold, and 'eof:observed' logs before 'ingest:completed' — proven red twice in run-5. PROCESS REQUIREMENT: iterate node --test on your file DURING authoring and only conclude when it is green against UNMUTATED code (this oracle CHARACTERIZES current behavior); then verify the kill yourself: seed the packet's sed mutation locally, confirm your named test (and ONLY an order assertion) goes red, restore runtime/index.js to byte-identity before handing back (the byte-identity rung enforces it). Never hand back a red file, and never hand back a file whose named test survives the seeded mutant — the red-then-green rung exits nonzero and the packet fails. Do NOT leave runtime/index.js modified; the engine's rung seeds and restores it itself."
