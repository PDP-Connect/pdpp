why_this_matters: "handleMsg (cc 194, the largest complexity mass in the owned core) mixes thirteen message families in one closure that captures ~30 nonlocal names. The PROGRESS and SKIP_RESULT arms are the purest reporting slice (validate → spine emit → onProgress, plus one scalar cell write lastSeenCollectionRate and the known-gap projection) — the right place to establish the explicit-context extraction pattern the whole campaign uses. Extracting them as module-level named handlers with an explicit ctx removes ~20 of handleMsg's cc and creates the msgCtx/runState seam every subsequent family packet reuses, without touching a grant/checkpoint/lifecycle property."
plan:
  transform_class: explicit-context-extraction
  instruction: "In runtime/index.js ONLY (no new module): (1) Create module-level (column-0) named async functions handleProgressMsg(msg, ctx) and handleSkipResultMsg(msg, ctx) containing the bodies of the 'PROGRESS' (line 3510) and 'SKIP_RESULT' (line 3221) case arms, moved verbatim except for context threading. (2) In runConnector, build ONE explicit context object const msgCtx = { scopeByStream, manifestByStream, traceContext, connectorId, runId, runSource, grantId, emitSpineEvent: emitSpineEventTracked, onProgress, buildKnownGap, appendKnownGap, explicitlyRequestedStreams, runState, ... } (extend as families need — later packets add members; keep it ONE object, built once, near the existing emitSpineEventTracked declaration). (3) Introduce const runState = { lastSeenCollectionRate: null } replacing the loose let lastSeenCollectionRate (runtime/index.js:2381); migrate EVERY read/write of that cell (grep the whole file; the terminal/report readers below the message loop) to runState.lastSeenCollectionRate. (4) The two case arms become thin delegations: case 'PROGRESS': await handleProgressMsg(msg, msgCtx); break; (same for SKIP_RESULT). (5) The new handlers must capture NOTHING from runConnector scope — module level (column 0) makes closure capture of run-scoped cells impossible by construction; module-scope pure helpers (validateProgressMessage, validateSkipResultMessage, normalizeGapScope, streamUnsupportedInDefaultScope, boundGapString) may be referenced directly. Spine event payloads, event order (validate → emit → cell write → onProgress), thrown messages, and onProgress payloads stay byte-equivalent. (6) CALL-STYLE MANDATE — repaired 2026-07-02 per run-4: context fields MUST be destructured into locals before invocation (const { onProgress } = msgCtx; onProgress(msg)), NEVER method-called off the context object (ctx.onProgress(msg) is FORBIDDEN). WHY: in strict mode a method call rebinds this inside the callback from undefined to the context object — an observable behavior change; run-4's judge REJECTed this packet (confidence 0.84) for exactly this. (7) BASELINE BELT-AND-BRACES — repaired 2026-07-02 per run-4: the round-1 evidence gap (missing baseline direct-test receipt) is fixed engine-side, but the maker must STILL run the direct-test rung's command manually FIRST and confirm it passes green BEFORE making any edit."
