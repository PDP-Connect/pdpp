why_this_matters: "validateDoneError is the pure gate between connector-authored terminal errors and durable run.failed artifacts. Existing integration coverage rejects malformed DONE.error envelopes, but there is no small by-name oracle pinning the normalization contract: succeeded runs cannot include terminal error details, unsupported fields are rejected, code must be bounded snake_case, message is trimmed, and absent retryable normalizes to null. A mutation that relaxes the code regex or skips message trimming would silently admit unstable terminal vocabulary."
