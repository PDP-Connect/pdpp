  transform_class: add-mutation-killing-pure-oracle
  instruction: "Create test/done-error-normalization-oracle.test.js. Import validateDoneError from ../runtime/done-validators.js. Add named node:test cases that assert: null error returns null; status='succeeded' with an error returns an Error whose message includes 'succeeded runs must not include'; non-object/array errors reject; unsupported fields reject and name the unsupported field; code accepts 'provider_throttle_1' but rejects uppercase, leading digit, hyphen, and >64 chars; message must be a non-empty string after trim; retryable must be boolean when present; a valid failed error returns exactly { code:'provider_throttle_1', message:'trimmed', retryable:null } when retryable is omitted, and preserves retryable:false. Use assert.equal/deepEqual and assert.match on Error.message."
