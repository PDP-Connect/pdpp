why_this_matters: "The express-compat content-negotiation policy lives as two inline arrows assigned inside expressShim, each CAPTURING req from the shim's scope: req.is (:323, cc 14) decides content-type matching (parameter stripping, array-vs-single candidates, matchesMediaType delegation) and req.accepts (:337, cc 21) decides accept-header matching (short/long-form expansion, '*/*' first-candidate rule). The negotiation policy — pure string-matching over two header values — is braided with the shim-wiring concern (when to install a polyfill on req). Hidden state: both callbacks read req.headers through the capture, so the policy has no single-entry testable surface; the follow-up oracle (t1b-transport-shim-negotiation-evidence-0001) pins it only route-level. Making the header values EXPLICIT parameters of two named module functions gives the negotiation contract an addressable surface and shrinks expressShim to wiring."
plan:
  transform_class: explicit-context-extraction
  instruction: "In server/transport.js hoist the two callback BODIES to named module-scope functions near matchesMediaType: (1) matchedContentType(contentTypeHeader, types) — body of the req.is arrow with `req.headers?.['content-type']` replaced by the explicit contentTypeHeader param; (2) acceptedType(acceptHeader, types) — body of the req.accepts arrow with `req.headers?.accept` replaced by the explicit acceptHeader param. Rewire inside expressShim: req.is = (types) => matchedContentType(req.headers?.['content-type'], types); req.accepts = (types) => acceptedType(req.headers?.accept, types). Branch bodies otherwise byte-identical (String() coercions, toLowerCase placement, candidate iteration order, false returns). Keep both functions module-private; move the explanatory comments above their new owners. Do not touch req.get/req.hostname or the res shim."
