why_this_matters: "typeFor (server/routes/ref-error-status.ts) turns an HTTP status into the top-level `type` in every public error envelope (typeFor per b-contract-inventory-2026-07-01.md §3). The existing ref-error-status.test.js pins the six explicit branches and a couple fallbacks, but NOT the full status->type surjection nor the code->type ROUND TRIP for every code. The subtle, load-bearing behavior is that 409/422/425/500 all fall through to api_error (there is no conflict_error/unprocessable_error type) — so ambiguous_connection (409), field_not_text (422), and provider_pressure_cooldown (425) all advertise type api_error. A caller keys off `type`; a mutation that added a 409 branch, or dropped the 410->gone_error branch, would change the envelope type for a whole status class with no failing test. This packet pins typeFor as a total function over the status classes AND asserts typeFor(codeToStatus[code]) for every code, so the envelope's advertised type is contract-fixed end to end. Pure no-DB oracle; complements tst-error-status-completeness-0005 (status side) on the type side — disjoint touchset."
plan:
  transform_class: add-type-surjection-roundtrip-oracle
  instruction: "Create test/ref-error-status-type-roundtrip-oracle.test.js (NEW file; touch no source). Import { typeFor, codeToStatus } from '../server/routes/ref-error-status.ts'. Pin: (1) the exact status->type map: typeFor(400)==='invalid_request_error', 401->'authentication_error', 403->'permission_error', 404->'not_found_error', 410->'gone_error', 429->'rate_limit_error'; (2) the api_error fallback for every UNMAPPED status that appears in codeToStatus and beyond: typeFor(409), typeFor(422), typeFor(425), typeFor(500), typeFor(200), typeFor(418) all === 'api_error'; (3) ROUND TRIP: for every code in codeToStatus, typeFor(codeToStatus[code]) is a non-empty string, and assert the specific surjection — codes at 409/422/425/500 => 'api_error' (name at least ambiguous_connection->api_error, field_not_text->api_error, provider_pressure_cooldown->api_error, connector_instance_store_required->api_error), codes at 403 => 'permission_error', 404 => 'not_found_error', 400 => 'invalid_request_error', 410 => 'gone_error', 401 => 'authentication_error'. Drive assertion (3) as a loop over Object.entries(codeToStatus) with an expected-type-by-status helper so a wrong typeFor branch fails naming the offending code. node:assert/strict."
