why_this_matters: "The fetch tool's self-contained-id contract is the load-bearing fix for the 2026-06-09 ChatGPT dead-end (self-contained-result-id.test.js documents it): a search hit id must carry its own connection so fetch(id) needs no second handle. But the id-FORM DISPATCH inside the fetch handler — parseRecordResultId splitting `connection_id/stream:record_id` vs legacy `stream:record_id`, forwarding the embedded connection_id into the RS query, and rejecting an embedded-vs-argument connection_id MISMATCH via ConflictingConnectionIdError — has no by-name test asserting the resulting RS request path/connection scope per id form. self-contained-result-id.test.js proves the end-to-end journey but does not pin the three id forms and the conflict rejection AS A TABLE. A mutation that stopped forwarding the embedded connection_id (regressing the exact ChatGPT dead-end) or dropped the conflict check would pass the existing suite. This packet pins each id form's RS effect and the conflict error by name."
