  transform_class: add-id-form-dispatch-contract-test
  instruction: "Create packages/mcp-server/test/fetch-id-form-contract.test.js (NEW file; touch no source). Drive the fetch tool via an in-memory MCP client (Client + InMemoryTransport) with a fake `fetch` that records calls (path + parsed query) and returns an OpenAI-doc-shaped 200 body, mirroring self-contained-result-id.test.js. Pin the id-form table by asserting the recorded RS request: (1) self-contained id 'conn_a/orders:o1' alone -> RS path /v1/streams/orders/records/o1 with query connection_id=conn_a (embedded connection forwarded, tools.js:672-675); (2) legacy id 'orders:o1' with NO connection_id arg -> same path, NO connection_id in query; (3) legacy id 'orders:o1' + connection_id arg 'conn_b' -> query connection_id=conn_b; (4) self-contained id 'conn_a/orders:o1' + AGREEING connection_id arg 'conn_a' -> accepted, query connection_id=conn_a; (5) self-contained id 'conn_a/orders:o1' + CONFLICTING connection_id arg 'conn_b' -> result.isError with message matching \"id embeds connection_id 'conn_a' but the connection_id argument is 'conn_b'\" and structuredContent.error.code === 'conflicting_connection_id' AND the fake fetch recorded ZERO record-fetch calls (rejected before the RS call). node:assert/strict; deepEqual/parse the recorded query via URLSearchParams."
