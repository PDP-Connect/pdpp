why_this_matters: "buildWindowEnvelope (server/record-field-window.js:197) computes the paging math that every read_record_field response carries: start/end clamping to total_chars, complete/has_more, and the next/previous paging cursors. The DB-backed conformance test (test/record-field-window-substrate.test.js) exercises this only through the storage path and never asserts the pure math at its boundaries — a prior analysis found ZERO mutation-kill evidence for this module. The genuinely-unpinned boundary is previous_offset_chars mid-clamp: line 216 is `start > 0 ? Math.max(0, start - limit) : null`, so for 0 < start < limit the correct answer is 0 (clamped), NOT start - limit (negative) and NOT null. Also unpinned as pure assertions: complete requires start===0 AND end>=total (a window that starts mid-field is never complete even if it reaches the end); has_more === end < total; next_offset_chars === end when more remains else null; end clamps to total when offset+text.length overshoots; start clamps to total when offset > total. A mutation to any of these ships a wrong paging cursor with no failing test. This is a fast no-DB oracle."
plan:
  transform_class: add-pure-fn-envelope-oracle
  instruction: "Create test/record-field-window-envelope-oracle.test.js (NEW file; touch no source). Import { buildWindowEnvelope } from '../server/record-field-window.js' (pure, no DB). Assert the envelope math at its boundaries: (a) MID-CLAMP: buildWindowEnvelope({ text:'abcde', totalChars:100, offset:3, limit:10 }) -> previous_offset_chars === 0 (0<start<limit clamps to 0, NOT -7, NOT null); (b) buildWindowEnvelope({ text:'x'.repeat(30), totalChars:100, offset:50, limit:30 }) -> previous_offset_chars === 20, next_offset_chars === 80, has_more === true, complete === false; (c) START-AT-ZERO reaching end: offset:0, text length === totalChars -> complete === true, has_more === false, next_offset_chars === null, previous_offset_chars === null; (d) MID-FIELD reaching end is NOT complete: offset:10, text reaches total -> complete === false even though has_more === false; (e) END CLAMP: offset:90, text length 30, totalChars 100 -> end_chars === 100 (not 120), has_more === false; (f) START CLAMP: offset:200 > totalChars 100 -> start_chars === 100, end_chars === 100; (g) match coords pass through: matchStartChars/matchEndChars default null and echo when supplied. node:assert/strict; assert every listed field so the whole envelope shape is pinned."
