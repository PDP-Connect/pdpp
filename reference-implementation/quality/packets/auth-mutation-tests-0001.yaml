why_this_matters: "Agenda #1 (auth-mutation-killing-tests, divergence-flagged at zero realized spend across 3 batches): doctrine names mutant-killing tests as a hard prerequisite — 'add mutant-killing tests BEFORE any auth refactor' — and a prior mutation run left cookie-security and session-expiry mutants alive at ~60% score. server/auth.js (5,926 LOC, attention 41,464, hotspot score 68,591) is the largest owned hotspot and is NOGO for autonomous refactor; this evidence-generation packet is the only move that converts the b-auth-substrate-policy-split campaign from blocked to workable. Verification 2026-07-02 falsified half the provenance: the cookie-security class does not live in auth.js at all (zero cookie code there; the session cookie is built in server/owner-session.ts and its flags are already pinned by name in test/owner-session.test.js, test/owner-csrf.test.js and test/owner-session-env.test.js) — so this packet narrows to the expiry-enforcement class inside server/auth.js, where three grep-unique mutation sites (isExpired :64-66 gating 12 call sites, the introspection expiry branch :5708, expiresInIso TTL arithmetic :60-62) have no fast by-name oracle: expiry coverage today is either store-conformance-shaped or buried in the slow CLI integration suite, and the device-exchange expired_token contract is asserted nowhere through production code."
plan:
  transform_class: direct-unit-oracle-generation
  instruction: "Add test/auth-expiry-enforcement.test.js — targeted mutant-killing tests for the credential-expiry enforcement sites in server/auth.js (agenda item auth-mutation-killing-tests: prior mutation run reported ~60% score with cookie-security and session-expiry survivors). SCOPE NARROWING, VERIFIED 2026-07-02 — do NOT write cookie-attribute tests: server/auth.js contains ZERO cookie code (grep -i over httponly/samesite/secure/cookie: 0 matches); the session cookie is built in server/owner-session.ts buildOwnerSessionSetCookie (:190-205) and its HttpOnly/SameSite/Path/Secure/Max-Age attributes are ALREADY pinned by name in test/owner-session.test.js:44-58 and :70-71, the SameSite=Strict opt-in on the live server in test/owner-csrf.test.js:715-726, the TTL default + env override in test/owner-session-env.test.js, and expired-session-token rejection (owner-session.ts:113) in test/owner-session.test.js:39-42 — duplicating any of those is an automatic REVISE. What is NOT pinned fast and by name is expiry enforcement inside server/auth.js; pin these four contracts with EXACTLY these test names: (1) 'fresh pending consent: lookup succeeds with a future expires_at' — start a device flow, then assert getPendingConsent returns the pending view and its expires_at parses to a FUTURE instant (kills TTL-arithmetic mutants in expiresInIso :60-62). (2) 'expired pending consent: lookup returns null and approve is refused not_found' — rewind the row (UPDATE pending_consents SET expires_at = <past ISO> WHERE device_code = ?, the exact seam pattern of test/helpers/sqlite-consent-device-auth-driver.js:183-191), then assert getPendingConsent (:3235, isExpired gate at :3239) returns null and approveGrant (:3280) throws code not_found with message containing 'Pending consent request has expired' (:3292-3297). (3) 'expired device code: grant-scoped exchange fails expired_token' — rewind, then exchangeGrantScopedDeviceCode (:3467) must throw the RFC 8628 expired_token error 'Device code has expired' (:3483-3486). (4) 'expired client token: introspect returns active false with inactive_reason grant_expired' — issue a client grant token via the normal flow, assert introspect() reports active:true BEFORE the rewind (so the test discriminates the branch, not the fixture), then UPDATE tokens SET expires_at = <past ISO> WHERE token_id = ? (the pattern of test/cli.test.js:661-665) and assert introspect (:5678) returns active:false with inactive_reason grant_expired (expiry branch :5708-5731). HARNESS: self-contained SINGLE file — import production functions directly from ../server/auth.js (getPendingConsent, approveGrant, exchangeGrantScopedDeviceCode, introspect are all exported) and the DB handle from ../server/db.js (initDb/getDb/closeDb against a mkdtemp sqlite path, the style of test/helpers/sqlite-consent-device-auth-driver.js:26-47), or run the in-process server via startServer the way test/b3-introspection-resources-conformance.test.js does where a route-level flow is simpler; either way create NO other file — anything outside the touchset is a fail-closed revert. Move time by direct row UPDATEs on expires_at, never wall-clock sleeps. EXISTING-COVERAGE HONESTY (verified 2026-07-02): the consent-device conformance suites already cover expired-pending-consent lookup/approve/deny via the forceExpirePendingConsent seam (test/helpers/consent-device-auth-conformance.js:259-301), and test/cli.test.js:657-673 covers introspect grant_expired through the slow CLI integration harness — this oracle's value is FAST, by-name, single-file pinning that the auth-substrate-policy-split refactor loop can run per-iteration, plus the device-exchange expired_token contract that no test currently asserts through production code ('Device code has expired' appears in test/ only inside helper reimplementations); 'Authorization code has expired' (:4912, PKCE code exchange) is also unpinned anywhere — pin it too ONLY if you can drive exchangeOAuthAuthorizationCode without bloating the harness; it is optional, the four named contracts are mandatory. PROCESS (non-negotiable): run node --test test/auth-expiry-enforcement.test.js iteratively DURING authoring and only conclude when it is green against UNMUTATED code — this oracle characterizes what auth.js does today; if an assertion is red on unmutated code your harness or your reading is wrong, fix that before handing back; never hand back a file whose own direct-test rung is red. Seeded-regression discrimination is ENGINE-RUN (makers cannot write receipts — quality/ is forbidden to them): three red-then-green-* rungs each seed one grep-unique mutation in server/auth.js via sed, run this oracle expecting the matching named test to FAIL, and restore — (m1) isExpired body to return false (:65), (m2) introspection expiry condition to false (:5708), (m3) expiresInIso TTL sign flip (:61). Author each test so its mutation reds it by name. Do NOT mutate server/auth.js yourself; the rungs seed and restore it, and the byte-identity rung proves restoration."
