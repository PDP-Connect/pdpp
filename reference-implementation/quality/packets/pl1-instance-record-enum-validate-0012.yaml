why_this_matters: "normalizeRecord (cc10, scope-fn red_scan empty) validates then builds a connector-instance record. It braids ENUM VALIDATION (two required-field guards plus two assertOneOf membership checks over VALID_SOURCE_KINDS and VALID_STATUSES) with ROW CONSTRUCTION (source-binding key derivation + a defaulted object literal including a content-addressed connectorInstanceId default). Extracting the enum-resolution-and-validation into a named pure helper that returns the validated { sourceKind, status } separates validation from construction, removing the assertOneOf branch cluster from the builder. Pure function, no I/O. NOTE: this is the RECORD normalizer, NOT the admission-status resolver resolveOwnerConnectorInstanceNamespace / resolveByExplicitInstanceId (those gate draft read-reachability and are deliberately OUT OF SCOPE)."
plan:
  transform_class: extract-enum-validation
  instruction: "In server/stores/connector-instance-store.js ONLY. Create ONE module-level (column-0) pure named function ABOVE normalizeRecord:\n\nfunction resolveInstanceRecordEnums(record) — returns { sourceKind, status }. Contains VERBATIM the required-field guards + the two enum resolutions/validations currently at L152-156: `if (!record.ownerSubjectId) throw new Error('ownerSubjectId is required.'); if (!record.connectorId) throw new Error('connectorId is required.'); const sourceKind = record.sourceKind ?? 'manual'; assertOneOf(VALID_SOURCE_KINDS, sourceKind, 'sourceKind'); const status = record.status ?? 'active'; assertOneOf(VALID_STATUSES, status, 'status'); return { sourceKind, status };`. assertOneOf, VALID_SOURCE_KINDS, VALID_STATUSES are module-scope — reference directly.\n\nSEAM MECHANISM (explicit): resolveInstanceRecordEnums takes ONE explicit parameter named `record` (== the caller's parameter identifier), so normalizeRecord delegates with a bare identifier and destructures the result: `const { sourceKind, status } = resolveInstanceRecordEnums(record);`.\n\nHARD PRESERVE: the two required-field Error messages byte-for-byte, the `?? 'manual'`/`?? 'active'` defaults BEFORE the assertOneOf calls, the assertOneOf argument order (SET, value, label), and — remaining in normalizeRecord AFTER the destructure — the sourceBindingJson = stableJson(record.sourceBinding ?? {}) line, the sourceBindingKey = record.sourceBindingKey ?? makeConnectorInstanceSourceBindingKey(record.sourceBinding ?? {}) line, and the ENTIRE returned object literal including the connectorInstanceId ?? makeConnectorInstanceId({ ownerSubjectId, connectorId, sourceKind, sourceBindingKey }) default and every other field/default in exact order. NO new module file, NO behavior change. DO NOT touch resolveOwnerConnectorInstanceNamespace or resolveByExplicitInstanceId (admission-status gates)."
