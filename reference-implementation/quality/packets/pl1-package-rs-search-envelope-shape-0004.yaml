  instruction: "In server/package-rs-client.js ONLY. Create ONE module-level (column-0) pure named function ABOVE mergeSearchEnvelopes:\n\nfunction placeSearchHitsInEnvelope(baseBody, limitedHits, totalScanned) — contains VERBATIM the five-way container placement currently at L704-715: `if (Array.isArray(baseBody.data)) { baseBody.data = limitedHits; } else if (baseBody.data && typeof baseBody.data === 'object' && Array.isArray(baseBody.data.data)) { baseBody.data = { ...baseBody.data, data: limitedHits }; } else if (baseBody.data && typeof baseBody.data === 'object' && Array.isArray(baseBody.data.results)) { baseBody.data = { ...baseBody.data, results: limitedHits }; if (totalScanned > 0) baseBody.data.scanned = totalScanned; } else if (Array.isArray(baseBody.results)) { baseBody.results = limitedHits; } else { baseBody.data = { results: limitedHits }; }`. It mutates the passed-in baseBody in place and returns nothing (or returns baseBody — pick the no-return form to match the in-place mutation the original does).\n\nSEAM MECHANISM (explicit): placeSearchHitsInEnvelope takes THREE explicit parameters whose NAMES ARE the caller's closure identifiers — baseBody, limitedHits, totalScanned — so the call site reads `placeSearchHitsInEnvelope(baseBody, limitedHits, totalScanned);` with bare identifiers, no closure capture. The helper mutates baseBody exactly as the inline branch did.\n\nHARD PRESERVE — the hit accumulation is OUT OF SCOPE and must be byte-identical: the `results.forEach((r, i) => { ... const hits = extractSearchHits(r.body); for (const hit of hits) { mergedHits.push(decorateSearchHitWithSource(hit, memberSourceTag(child.member))); } ... })` block, the `dedupeSearchHits(mergedHits)`, `dedupedHits.slice(0, requestedLimit)`, truncated computation, sourceMixForHits, the has_more assignment, the entire meta.package object, and the meta.warnings merge ALL stay exactly as written. The ONLY edit is: replace the inline five-way if/else-if chain (L704-715) with the single `placeSearchHitsInEnvelope(baseBody, limitedHits, totalScanned);` call. NO new module file, NO public-shape change, NO change to any push/map over hits or rows."
