why_this_matters: "finalizeUpcoming's per-partition cursor policy — the rule deciding whether a partition appears in the next-page cursor and at WHICH resume position — is an anonymous forEach callback (cc 8) CAPTURING five closure bindings: lastEmittedByPartition, partitionOverflow, cutByPartition, afterByKey, and the nextPositions accumulator. The policy has three genuinely distinct outcomes (exhausted => omitted; contributed a row => resume at its last emitted row; contributed nothing but overflowed => carry the INCOMING position unchanged so the next page re-probes) and the third one is the subtle correctness rule the reachability regression suite exists for. Hidden in a capture-heavy loop it cannot be reasoned about locally; extracted with the four read-only lookups passed explicitly and the position RETURNED (not pushed), it becomes a pure function partition -> position|null."
plan:
  transform_class: explicit-context-extraction
  instruction: "In server/explore-timeline-substrate.ts hoist the forEach body to a named module fn nextUpcomingPositionForPartition(partition, partitionIndex, lookups): UpcomingPartitionPosition | null where lookups is an explicit context object { lastEmittedByPartition: Map<number, PartitionRow>, partitionOverflow: readonly boolean[], cutByPartition: ReadonlySet<number>, afterByKey: Map<string, UpcomingPartitionPosition> } (all four were closure captures). The fn RETURNS null where the callback did the exhausted early-return, and returns the position object where the callback pushed. Callsite becomes: input.partitions.forEach((partition, partitionIndex) => { const pos = nextUpcomingPositionForPartition(partition, partitionIndex, lookups); if (pos) nextPositions.push(pos); }). Branch logic byte-identical: hasMore disjunction order (partitionOverflow[partitionIndex] ?? false, then cutByPartition), lastEmitted field mapping, incoming-position fallback via upcomingPartitionKey with ?? null defaults. Keep the carry-unchanged comment with the branch it explains."
