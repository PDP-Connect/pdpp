why_this_matters: "aggregateRecordsAcrossBindings (cc73, scope-fn red_scan empty — 'pure decomplect target') fans aggregateRecords across disjoint bindings and folds the per-binding results into one envelope. Its single for-of loop braids THREE separate reductions that only share the loop cursor: (1) grouped-bucket key-merge into mergedBuckets, (2) additive sum/count into value, (3) comparable min/max selection into bestComparable/value. Each already-grant-scoped per-binding result is merged by pure arithmetic here — no grant.streams / streamGrant / field enforcement lives in this function (aggregateRecords upstream owns that). Extracting the grouped-bucket merge and the min/max selection into named pure helpers removes the two nested-branch reductions from the loop body, cutting ~14 cc while leaving the additive value fold and the response assembly in place. The count_distinct cross-connection guard, the single-binding short-circuit, mergeMetaWarnings, and the final response shape stay byte-identical."
plan:
  transform_class: extract-pure-reduction-helpers
  instruction: "In server/records.js ONLY. Create TWO module-level (column-0) pure named functions ABOVE aggregateRecordsAcrossBindings:\n\n(A) function mergeGroupedAggregateBuckets(mergedBuckets, groups) — accepts the accumulator Map as its FIRST explicit parameter (parameter name mergedBuckets == the closure identifier at the call site) and the result.groups array as its second; contains VERBATIM the inner body currently at ~L3601-3606: `for (const bucket of groups) { const mapKey = JSON.stringify(bucket.key ?? null); const entry = mergedBuckets.get(mapKey) || { key: bucket.key ?? null, count: 0 }; entry.count += Number(bucket.count || 0); mergedBuckets.set(mapKey, entry); }`. It mutates the passed-in Map in place and returns nothing. Rename the loop variable from `bucket` only if needed for the param name; keep `groups` as the param.\n\n(B) function selectComparableExtremum(metric, currentBest, currentValue, resultValue, aggregateFieldSchema) — pure; contains VERBATIM the min/max block currently at ~L3613-3622 rewritten to RETURN the chosen { best, value } rather than assign outer locals: `const comparable = coerceComparableValue(resultValue, aggregateFieldSchema); if (comparable == null) return { best: currentBest, value: currentValue }; const shouldReplace = currentBest == null || (metric === 'min' ? comparable < currentBest : comparable > currentBest); return shouldReplace ? { best: comparable, value: resultValue } : { best: currentBest, value: currentValue };`. coerceComparableValue is a module-scope helper — call it directly, do NOT thread it.\n\nSEAM MECHANISM (explicit, mandatory): mergeGroupedAggregateBuckets takes the accumulator Map as a named first parameter whose NAME IS the caller's closure identifier `mergedBuckets`, so the call site reads `mergeGroupedAggregateBuckets(mergedBuckets, result.groups);` with the bare identifier — no closure capture, the Map is threaded by explicit parameter. selectComparableExtremum is fully value-in / value-out: it captures NOTHING; the call site destructures its return: `const picked = selectComparableExtremum(metric, bestComparable, value, result.value, aggregateFieldSchema); bestComparable = picked.best; value = picked.value;`.\n\nCALL-SITE REWRITE inside the existing for-of over `results`: replace the grouped-bucket inner for-loop (L3601-3606) with `mergedBuckets.set` — i.e. `for (const bucket of result.groups) {...}` becomes `mergeGroupedAggregateBuckets(mergedBuckets, result.groups);` (keep the surrounding `if ((isScalarGroup || isTimeBucket) && Array.isArray(result?.groups)) { mergedLimit = result.limit ?? mergedLimit; <CALL>; continue; }` exactly, including the mergedLimit assignment and continue). Replace the min/max block (L3613-3622) with the destructured selectComparableExtremum call above, keeping the enclosing `if (metric === 'min' || metric === 'max') {...}` arm.\n\nPRESERVE EXACTLY: the single-binding short-circuit (bindings.length===1 → aggregateRecords + extraWarnings meta append), the count_distinct throw, perBindingParams delete of connection_id/connector_instance_id, mapWithConcurrency fan-out, responseShape first-result capture, filteredRecordCount accumulation, mergeMetaWarnings(meta,...), the appendUniqueWarning extraWarnings loop, the `value = metric==='sum'||'count' ? 0 : null` init, the grouped vs scalar response branches, the `.sort(compareMergedAggregateGroups)` + `.slice(0, mergedLimit ?? undefined)`, and every response field. Number() coercions stay byte-identical. NO new module file, NO public-shape change."
