why_this_matters: "normalizeGapInput (cc19, scope-fn red_scan empty; its own body references only grant_id as a passthrough DATA field — no grant.streams / streamGrant.fields / field_not_granted enforcement) normalizes a detail-gap input record. It braids three separable concerns: (1) required-identity derivation + validation (connectorId / connectorInstanceId-with-default / stream, with three throw guards), (2) sanitized-metadata mapping through sanitizeDetailGapMetadata, and (3) the content-addressed gapId derivation via hashIdentity over a fixed 7-tuple. Concerns (1) and (3) are self-contained branch/derivation clusters that can move to named pure helpers, shrinking the entry function to a straight assembly. The secret-redacting sanitizeDetailGapMetadata is NOT touched (it is a security-relevant redactor with SECRET_KEY_PATTERN) — it is only CALLED, exactly as before."
plan:
  transform_class: extract-identity-and-id-derivation
  instruction: "In server/stores/connector-detail-gap-store.js ONLY. Create TWO module-level (column-0) pure named functions ABOVE normalizeGapInput:\n\n(A) function deriveGapIdentity(input) — returns { connectorId, connectorInstanceId, stream }. Contains VERBATIM the L90-95 derivation + the three throw guards: `const connectorId = nonEmptyString(input?.connectorId); const connectorInstanceId = nonEmptyString(input?.connectorInstanceId) || (connectorId ? defaultConnectorInstanceId(connectorId) : null); const stream = nonEmptyString(input?.stream); if (!connectorId) throw new Error('connector detail gap requires connectorId'); if (!connectorInstanceId) throw new Error('connector detail gap requires connectorInstanceId'); if (!stream) throw new Error('connector detail gap requires stream'); return { connectorId, connectorInstanceId, stream };`. nonEmptyString and defaultConnectorInstanceId are module-scope — call directly.\n\n(B) function deriveGapId(input, connectorId, connectorInstanceId, grantId, stream, parentStream, recordKey, detailLocator) — returns the gapId. Contains VERBATIM the L107-115 derivation: `return input.gapId || hashIdentity([connectorId, connectorInstanceId, grantId || '', stream, parentStream || '', recordKey || '', detailLocator || null]);`. hashIdentity is module-scope — call directly.\n\nSEAM MECHANISM (explicit): both helpers take explicit parameters whose NAMES equal the caller's locals (input, connectorId, connectorInstanceId, grantId, stream, parentStream, recordKey, detailLocator), so both call sites read as bare-identifier delegations. normalizeGapInput becomes: `const { connectorId, connectorInstanceId, stream } = deriveGapIdentity(input);` then the sanitized-metadata block and the grantId/parentStream/recordKey/reason/now locals UNCHANGED, then `const gapId = deriveGapId(input, connectorId, connectorInstanceId, grantId, stream, parentStream, recordKey, detailLocator);`, then the return object literal UNCHANGED.\n\nHARD PRESERVE: every sanitizeDetailGapMetadata(...) call stays byte-identical (do NOT alter that function or its call arguments — it is the secret redactor), the `input.source || { kind: 'connector', id: connectorId }` default, all nonEmptyString coercions, the recordKey String() coercion, `input.now || nowIso()`, the lastRunId fallback (`nonEmptyString(input.lastRunId) || nonEmptyString(input.discoveredRunId)`), and the ENTIRE returned object literal with its exact key order. The three Error messages stay byte-for-byte. NO new module file, NO behavior change."
