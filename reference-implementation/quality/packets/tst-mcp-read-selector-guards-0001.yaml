why_this_matters: "The read_record_field Tier-2 progressive-disclosure tool is the crown of the MCP content ladder, yet its MCP-LAYER window-selector guards have ZERO by-name test coverage (b-contract-inventory-2026-07-01.md §6 names content_ladder as the highest-value gap; the structuredContent block was pinned by ce8dfc58b but the tool-input selector-exclusivity enforcement was not). grep of packages/mcp-server/test/ for resolveReadRecordFieldRef, readRecordFieldQuery, parseFieldWindowCursor, and InvalidReadRecordFieldSelectorError returns ZERO files (2026-07-02). These four guards (tools.js:744 resolveReadRecordFieldRef id-vs-triple exclusivity; tools.js:773 readRecordFieldQuery cursor/offset/q exclusivity + before/after-require-q; tools.js:807 parseFieldWindowCursor integer-only; lines re-verified 2026-07-05 — tools.js is a published .js package, NOT migrated to .ts) are a SEPARATE enforcement point from the RS substrate guards in record-field-window.js — a mutation that dropped any one of them would let a malformed/ambiguous selector reach the RS with no MCP-layer rejection, and no test would fail. This packet pins each guard by driving the real read_record_field handler through an in-memory MCP client with a fake rs, asserting the exact InvalidReadRecordFieldSelectorError message so a silent weakening is caught."
plan:
  transform_class: add-by-name-selector-contract-test
  instruction: "Create packages/mcp-server/test/read-record-field-selector-contract.test.js (a NEW file; touch no source). Import createPdppMcpServer from ../src/server.js and drive the read_record_field tool via an in-memory MCP client (Client + InMemoryTransport from @modelcontextprotocol/sdk, exactly as self-contained-result-id.test.js does) passing a fake `fetch` (the createPdppMcpServer option is `fetch`, per src/server.js:37 and self-contained-result-id.test.js:128) whose calls[] is never expected to grow on the rejection cases. Pin each guard by asserting result.isError === true AND the exact message substring on result.content[0].text (parsed JSON) / result.structuredContent.error.message: (1) id + explicit triple together -> '`id` is exclusive with explicit `connection_id`, `stream`, and `record_id`'; (2) id without connection_id (e.g. 'orders:o1') -> 'must include connection_id'; (3) neither id nor full triple -> 'requires either `id` + `field_path` or `connection_id` + `stream` + `record_id`'; (4) cursor + offset_chars -> '`cursor` is exclusive with `offset_chars`'; (5) q + offset_chars -> '`q` is exclusive with `cursor` and `offset_chars`'; (6) before_chars without q -> '`before_chars` and `after_chars` require `q`'; (7) cursor = 'abc' (non-integer) -> 'field-window cursor must be a non-negative integer offset'. Also assert ONE happy path (valid self-contained id + field_path + offset_chars) reaches the fake rs with the expected /field-window query, proving the guards do not over-reject. Follow the fixture style of self-contained-result-id.test.js (jsonResponse helper, calls[] recorder). node:assert/strict."
