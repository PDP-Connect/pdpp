why_this_matters: "The idempotency fix (2f122e547) has TWO halves: (a) do NOT recreate a MATCHING index (pinned + mutation-verified by tst-record-index-idempotency-0008), and (b) DO repair an OBSOLETE same-name index whose definition no longer matches the expected column set. Half (b) is the safety valve that lets a schema migration land on the next boot — if it regressed, a stale/wrong index would silently persist and serve incorrect query plans (or the wrong columns) forever. The shipped test/postgres-record-index-bootstrap.test.js has a 'repairs obsolete same-name index definitions' case but no demonstrated mutation-kill evidence. This packet pins half (b) sharply in a new file (disjoint touchset from 0008) and PROVES via the mutation ladder that forcing matchesExpected=true (never repair) makes it go red. High-value: a silent repair regression persists an obsolete index against the live 18GB Postgres."
plan:
  transform_class: add-obsolete-index-repair-oracle
  instruction: "Create test/postgres-record-index-repair-oracle.test.js (NEW file; touch no source). Follow the harness of test/postgres-record-index-bootstrap.test.js (PDPP_TEST_POSTGRES_URL guard; withTempDb; readIndex returning pg_get_indexdef definition + oid). Pin the repair contract: (1) boot once; then DROP INDEX idx_pg_records_stream_version and CREATE INDEX idx_pg_records_stream_version ON records(stream, version) — an OBSOLETE same-name definition missing the connector_instance_id lead column; assert the obsolete def matches /USING btree \\(stream, version\\)/; (2) boot AGAIN (initPostgresStorage); assert the repaired def now matches /USING btree \\(connector_instance_id, stream, version\\)/ — the bootstrap replaced the obsolete same-name index with the current expected definition. Keep it to the repair assertion (oid-stability of matching indexes is pinned by tst-record-index-idempotency-0008 — do NOT duplicate). Skipped test when PDPP_TEST_POSTGRES_URL unset, exactly like the sibling. node:assert/strict."
