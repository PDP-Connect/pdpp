why_this_matters: "normalizeOutboxDiagnostics (cc10, scope-fn red_scan empty) validates an untrusted outbox-diagnostics object into a normalized shape. It braids two independent validation concerns that share only the output accumulator: (1) the bounded non-negative-integer COUNT collection over OUTBOX_DIAGNOSTIC_COUNTS, and (2) the oldest_pending_at TIMESTAMP string validation via Date.parse. Splitting them into two named pure helpers makes each concern independently readable and testable and removes the interleaved branching from the entry function. Both helpers are pure (no I/O)."
plan:
  transform_class: extract-validation-concerns
  instruction: "In server/stores/device-exporter-store.js ONLY. Create TWO module-level (column-0) pure named functions ABOVE normalizeOutboxDiagnostics (below the existing normalizeDiagnosticCount and OUTBOX_DIAGNOSTIC_COUNTS):\n\n(A) function collectDiagnosticCounts(value) — returns a plain object of the accepted counts. Contains VERBATIM the count loop (L163-169): `const normalized = {}; for (const field of OUTBOX_DIAGNOSTIC_COUNTS) { const count = normalizeDiagnosticCount(value[field]); if (count !== null) { normalized[field] = count; } } return normalized;`. OUTBOX_DIAGNOSTIC_COUNTS and normalizeDiagnosticCount are module-scope — call directly.\n\n(B) function validOldestPendingAt(value) — returns the accepted string or null. Contains VERBATIM the timestamp guard (L170-175) rewritten to return: `if (typeof value.oldest_pending_at === 'string' && value.oldest_pending_at.length > 0) { const parsed = Date.parse(value.oldest_pending_at); if (Number.isFinite(parsed)) return value.oldest_pending_at; } return null;`.\n\nSEAM MECHANISM (explicit): both helpers take a single explicit parameter named `value` (== the caller's parameter identifier), so both call sites read as bare-identifier delegations. normalizeOutboxDiagnostics becomes: `if (value == null || typeof value !== 'object' || Array.isArray(value)) return null; const normalized = collectDiagnosticCounts(value); const oldestPendingAt = validOldestPendingAt(value); if (oldestPendingAt !== null) normalized.oldest_pending_at = oldestPendingAt; return Object.keys(normalized).length > 0 ? normalized : null;`.\n\nHARD PRESERVE: the top null/object/array guard, the exact OUTBOX_DIAGNOSTIC_COUNTS iteration order and normalizeDiagnosticCount filtering (null-skip), the Date.parse + Number.isFinite acceptance of oldest_pending_at, the final `Object.keys(normalized).length > 0 ? normalized : null` return, and — critically — that oldest_pending_at is written into `normalized` AFTER the counts (so an all-empty-counts object with only a valid timestamp still returns the object, matching current behavior). NO new module file, NO behavior change."
