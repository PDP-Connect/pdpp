why_this_matters: "listStreamsAcrossBindings (server/records.js, 67-commit churn file) decorates each per-binding stream summary with the binding's wire identity through an anonymous .map callback CAPTURING wireBinding — and the identical callback appears TWICE (default-bindings path :3694 and per-stream-resolver path :3739, the second with drifted indentation, cc 9 each). The decoration policy is caller-visible contract: connection_id and connector_instance_id both set to wireBinding.connection_id, display_name only when present, untouched summary when the binding has no connection_id, spread-clone never mutate. A verbatim duplicate of public-shape policy in a hot file is exactly where silent drift starts (one copy edited, the other forgotten). One named pure fn with wireBinding EXPLICIT kills the hidden capture and the duplication in the same cut."
plan:
  transform_class: explicit-context-extraction
  instruction: "In server/records.js add a named module fn decorateStreamSummaryWithBinding(summary, wireBinding) near listStreamsAcrossBindings: body is the shared callback body byte-identical (const decorated = { ...summary }; if (wireBinding?.connection_id) { decorated.connection_id = wireBinding.connection_id; decorated.connector_instance_id = wireBinding.connection_id; if (wireBinding.display_name) decorated.display_name = wireBinding.display_name; } return decorated;). Replace BOTH callsites with perBinding.map((summary) => decorateStreamSummaryWithBinding(summary, wireBinding)). Nothing else in either concurrency callback changes (listStreams awaits, projectBindingForWire construction, and result flattening stay put)."
