why_this_matters: "assertRecordIdentity (cc24, scope-fn red_scan empty) is a pure validator with two fully-disjoint branches sharing only the early null/object guard: (1) the no-declared-primary-key path (fields.length===0) that reconciles a scalar/single-element key against data.id, and (2) the declared-primary-key path that walks each primary-key field and compares String(dataValue) to the corresponding key part. The two paths never interact — the function returns early out of branch 1. Extracting each branch into a named pure helper removes the two independent comparison ladders from the entry function, cutting ~15 cc while every thrown-error message, code, and the position-skipping semantics (undefined data value or absent key part → continue) stay byte-identical. This is a pure-logic decomplect: no I/O, no grant, no consent."
plan:
  transform_class: extract-branch-validators
  instruction: "In server/record-expand-helpers.js ONLY. Keep assertRecordIdentity's signature (primaryKeyFields, key, data) and its two leading guards (the `if (data == null || typeof data !== 'object') return;` and `const fields = Array.isArray(primaryKeyFields) ? primaryKeyFields : [];`) exactly. Then create TWO module-level (column-0) pure named functions:\n\n(A) function assertScalarKeyIdentity(key, data) — contains VERBATIM the fields.length===0 body (current L42-48): `const single = typeof key === 'string' ? key : Array.isArray(key) && key.length === 1 ? key[0] : null; if (single != null && data.id !== undefined && data.id !== single) { const err = new Error(\\`key and data.id disagree: key=${single}, data.id=${data.id}\\`); err.code = 'invalid_record_identity'; throw err; }`. Returns nothing.\n\n(B) function assertCompoundKeyIdentity(fields, key, data) — contains VERBATIM the compound body (current L53-70): the keyParts derivation (`const keyParts = typeof key === 'string' || typeof key === 'number' ? [String(key)] : Array.isArray(key) ? key : [];`) plus the for-loop comparing String(dataValue) to String(keyParts[i]) with the two `continue` skips (dataValue===undefined; keyParts[i]===undefined) and the throw with code invalid_record_identity and its exact message.\n\nSEAM MECHANISM (explicit): both helpers are value-in only — they capture NOTHING; every argument (key, data, fields) is passed by explicit parameter with the same identifier name as the caller's local, so the call sites read as bare-identifier delegations. assertRecordIdentity becomes exactly: the two guards, then `if (fields.length === 0) { assertScalarKeyIdentity(key, data); return; }` and finally `assertCompoundKeyIdentity(fields, key, data);`.\n\nPRESERVE EXACTLY: the two Error messages (byte-for-byte including the template-literal interpolations and the field name in the compound message), err.code = 'invalid_record_identity' on both, the early return after the scalar branch, and all skip/continue conditions. The comments explaining single-field-scalar vs compound-array key encoding and the position-skipping rationale move WITH their code into assertCompoundKeyIdentity. NO new module file, NO behavior change."
