  instruction: "Create packages/mcp-server/test/parse-record-result-id-oracle.test.js (NEW file; touch no source). Import { __internal } from '../src/tools.js' and destructure parseRecordResultId. Pin the grammar: (1) 'conn_a/orders:o1' -> { connectionId:'conn_a', stream:'orders', recordId:'o1' }; (2) 'orders:o1' -> { connectionId:null, stream:'orders', recordId:'o1' }; (3) canonical URI: build id = 'pdpp://record/' + Buffer.from(JSON.stringify({ v:1, kind:'record', connection_id:'conn_a', stream:'orders', record_id:'o1' })).toString('base64url') -> parses to { connectionId:'conn_a', stream:'orders', recordId:'o1' } (the visible-handle-never-dead contract; this envelope matches decodeResourceHandle/encodeResourceUri); (4) a pdpp://record/ URI whose base64url payload is NOT valid resource JSON but IS a legacy self-contained grammar (e.g. 'pdpp://record/' + encodeURIComponent('conn_a/orders:o1')) falls back to parsing the embedded grammar -> connectionId 'conn_a'; (5) rejections via assert.throws: '' (empty), 123 (non-string), 'noseparator' (no ':'), 'orders:' (empty record_id), ':o1' (empty stream). node:assert/strict. Assert deepEqual on the full parsed object so field renames are caught."
