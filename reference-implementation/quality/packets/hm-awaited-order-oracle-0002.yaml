d EOF (connector writes 'EOF' sentinel line to a temp file; RS log timestamps/sequence prove order). (4) RECORD batch boundary: PDPP_RUNTIME_BATCH_SIZE=2 env for the child runtime... note BATCH_SIZE is read in-process (runtime/index.js:2385) so set process.env.PDPP_RUNTIME_BATCH_SIZE in the test before calling runConnector and restore after; emit 3 records → assert exactly 2 ingest POSTs for the stream (2+1) and that the first POST is awaited (delayed response defers the second). Assert named fields and ORDER, not timing margins (no waitForTimeout-style sleeps as sync primitives; use the RS server's request log and promise resolution order). Seeded-regression discrimination — restructured 2026-07-02 per run-2: judges demand a pasted FAILING seeded run, and makers cannot write receipts (quality/ is forbidden to them), so the evidence lives in ENGINE-RUN rungs, not in maker exhortations. The engine itself seeds, runs, and reverts three mutations in runtime/index.js via the red-then-green-* rungs below: (m1) drop the STATE arm's await on flushBatch(msg.stream) (:2986), (m2) drop the DONE arm's await on flushAll() (:3553), (m3) tighten the RECORD batch boundary 'length >= BATCH_SIZE' to 'length > BATCH_SIZE' (:2971) — each failing run is captured into receipts automatically. Author the oracle so each mutation makes its named test FAIL: this forces contracts (1), (3) and (4) to assert shared-sequence ORDER and exact POST counts rather than existence — run-2's judge refused existence-shaped assertions for DONE flush-before-EOF and INTERACTION attention/stdin ordering, and refused the MISSING RECORD batch-boundary case (4); all four contracts including (4) are mandatory, and the INTERACTION order assertions must read one shared monotonic sequence log even though no sed-able single-line mutation covers them. Do NOT mutate runtime/index.js yourself; the rungs seed and restore it."
