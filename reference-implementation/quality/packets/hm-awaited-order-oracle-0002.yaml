why_this_matters: "The A2 decomplection of handleMsg (cc 194) must prove awaited-order preservation (agenda acceptance criterion 2), and today the order is only implied, not pinned: (a) STATE awaits flushBatch(msg.stream) BEFORE staging newState[stream] and emitting run.state_staged — reordering silently breaks crash-consistency (a staged cursor whose records were never ingested = data loss on resume); (b) INTERACTION awaits, in order: run.interaction_required → run.assistance_requested → attentionWriter.recordInteractionRequest → Promise.race(response|timeout|violation) → run.interaction_completed → attentionWriter.resolveByRequestId → assistance resolution event → interaction_required known-gap (non-success) → stdin response write — the dashboard's attention projection and the connector's stdin protocol both depend on this order; (c) DONE(succeeded) awaits flushAll() BEFORE proc.stdin.end() — the EOF handshake that closes the buffered-stdout race (runtime-pipe-resilience pins the EOF exists, not that flush precedes it); (d) RECORD flushes at the PDPP_RUNTIME_BATCH_SIZE boundary (env-settable, runtime/index.js:2385) with the ingest POST awaited before the next message is processed. No existing test asserts any of these ORDERINGS by name; extraction packets hm-record-scope-extract-0004, hm-state-checkpoint-extract-0005, hm-interaction-lifecycle-extract-0009, hm-done-terminal-extract-0010 and hm-detail-gap-ledger-extract-0008 cite this file as their ordering oracle."
