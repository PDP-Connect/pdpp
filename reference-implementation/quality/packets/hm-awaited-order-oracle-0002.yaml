order chain conclude once the INTERACTION_RESPONSE has round-tripped to the child's stdin (in the timeout arm the runtime still writes the timeout response — observe it the same way). (B) SELF-CONTAINED SINGLE FILE — mirror what hm-0001's landed oracle did (its touchset was exactly [test/runtime-handle-msg-dispatch.test.js] and every helper lives inside that one file): ALL harness code — stub writer, RS stub with monotonic sequence log, sentinel plumbing — lives INSIDE test/runtime-handle-msg-order.test.js; creating ANY other file (probe-driver.mjs, probe-stdin.mjs, anything under test/helpers/) is a touchset violation and the engine reverts ALL work fail-closed. --- RUN-1 FOLD-BACK (maker's authored oracle stayed RED at post — twice; receipts post-1-direct-test.txt and post-r1-1-direct-test.txt): the single failing test both times was 'DONE(succeeded) arm: flushAll() ingest POSTs are answered before the connector observes stdin EOF' — AssertionError 'the connector observed stdin EOF and wrote its sentinel file' (actual null: the sentinel file never appeared). The contract itself IS current behavior — verified in runtime/index.js case 'DONE' (:3539): status 'succeeded' -> await flushAll() (:3553) BEFORE proc.stdin.end() (:3560) — so pin CURRENT behavior; the red came from the test harness, not the runtime. Harness requirement for (3): a Node child only receives stdin 'end' once its stdin is being CONSUMED — the fake connector must put process.stdin into flowing mode (attach a 'data' listener or call process.stdin.resume()) BEFORE the runtime closes it, keep its event loop alive until 'end' fires, and write the EOF sentinel synchronously (fs.writeFileSync) inside the 'end' handler before exiting 0 (test/runtime-pipe-resilience.test.js pins that this EOF handshake exists — reuse its working connector-side pattern). PROCESS REQUIREMENT (non-negotiable): run node --test test/runtime-handle-msg-order.test.js iteratively DURING authoring and only conclude when it is green