why_this_matters: "validateCanonicalSort (cc19, scope-fn red_scan empty) parses a caller sort spec and validates each entry against the manifest's advertised sortable vocabulary. It braids a normalization prelude (join/split/trim/filter into entries + sortableFields from cursor_field) with a per-entry validation loop carrying three distinct throw arms (empty field, not-advertised field, conflicting direction) sharing a running `resolved`. The per-entry validation is a self-contained decision given (entry, sortableFields, resolved) → the next resolved {field, direction}. Extracting it into a named pure helper removes the three-arm throw ladder from the loop, cutting ~11 cc, while every error code/param/message and the last-entry-wins resolution stay byte-identical."
plan:
  transform_class: extract-per-entry-validator
  instruction: "In server/record-query-helpers.ts ONLY. Create ONE module-level (column-0) pure named function ABOVE validateCanonicalSort:\n\nfunction validateSortEntry(entry, sortableFields, resolved) — returns the next resolved value { field, direction }. Contains VERBATIM the loop-body validation currently at L92-118: `const direction = entry.startsWith('-') ? 'DESC' : 'ASC'; const field = direction === 'DESC' ? entry.slice(1) : entry; if (!field) { const err = invalidQueryError('Empty sort field', 'invalid_sort'); err.param = 'sort'; throw err; } if (sortableFields.size === 0 || !sortableFields.has(field)) { const err = invalidQueryError(\\`Sort field '${field}' is not advertised as sortable; check /v1/schema for the canonical sort vocabulary.\\`, 'invalid_sort'); err.param = 'sort'; throw err; } if (resolved && resolved.direction !== direction) { const err = invalidQueryError(\\`Conflicting sort directions for field '${field}'\\`, 'invalid_sort'); err.param = 'sort'; throw err; } return { field, direction };`. invalidQueryError is module-scope — call directly.\n\nSEAM MECHANISM (explicit): validateSortEntry takes THREE explicit parameters whose NAMES equal the caller's loop identifiers — entry, sortableFields, resolved — so the call site reads as a bare-identifier delegation and the helper captures nothing. validateCanonicalSort's loop becomes: `for (const entry of entries) { resolved = validateSortEntry(entry, sortableFields, resolved); }`.\n\nHARD PRESERVE: the normalization prelude (null/'' guard → null, Array.isArray join(','), String() coercion, split(',')/trim/filter(Boolean), entries.length===0 → null), the `cursorField`/`sortableFields` derivation, the three throw arms byte-for-byte (message text, 'invalid_sort' code, err.param='sort'), the conflicting-direction check reading the PRIOR resolved before reassignment, and the final `return resolved`. NO new module file, NO behavior change. NOTE: the 'Empty sort field' template literal in the original uses backticks with no interpolation — keep it a template literal to stay byte-identical (do not convert to a plain string)."
