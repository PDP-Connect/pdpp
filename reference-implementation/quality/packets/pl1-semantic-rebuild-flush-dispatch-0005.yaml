why_this_matters: "rebuildSemanticIndexForStream (cc44, scope-fn red_scan empty — 'pure decomplect target') is the paged semantic-index backfill loop. Two self-contained storage-dispatch concerns are braided into the loop body: (1) the per-page RECORD READ — a usePostgres ternary choosing postgresSemanticRecordsPage vs getMany(referenceQueries.searchSemanticRecordsPageNonDeleted) (L1206-1213); and (2) the per-page ENTRY FLUSH — a three-way branch choosing postgresSemanticIndexInsertMany, index.upsertMany, or a per-entry index.upsert fallback (L1248-1256). Both dispatch blocks depend only on their explicit inputs (usePostgres, page keys / entries) and mutate no loop-carried state (lastId, indexed, scanned stay in the loop). Extracting them into two named async helpers removes both storage-branch clusters from the hot loop, cutting ~12 cc, while the pagination state machine, the cancellation signal check, the per-row JSON-parse + declaredFields embed loop, and the progressJob update stay in place. The embed/dedupe inner loop (which carries lastId) is deliberately NOT extracted to avoid threading loop-carried mutation."
plan:
  transform_class: extract-storage-dispatch-helpers
  instruction: "In server/search-semantic.js ONLY. Create TWO module-level (column-0) async named functions ABOVE rebuildSemanticIndexForStream:\n\n(A) async function readSemanticRecordsPage(usePostgres, connectorInstanceId, stream, lastId, PAGE) — contains VERBATIM the page-read ternary (L1206-1213): `return usePostgres ? await postgresSemanticRecordsPage({ connectorInstanceId, stream, lastId, limit: PAGE }) : getMany(referenceQueries.searchSemanticRecordsPageNonDeleted, [connectorInstanceId, stream, lastId], { limit: PAGE }).rows;`. postgresSemanticRecordsPage, getMany, referenceQueries are module-scope — call directly, do NOT thread.\n\n(B) async function flushSemanticIndexEntries(usePostgres, connectorId, connectorInstanceId, entries, index) — contains VERBATIM the flush branch (L1248-1256): `if (usePostgres) { await postgresSemanticIndexInsertMany({ connectorId, connectorInstanceId, entries }); } else if (entries.length > 0 && typeof index.upsertMany === 'function') { await index.upsertMany(entries); } else { for (const entry of entries) { await index.upsert(entry); } }`. Returns nothing. postgresSemanticIndexInsertMany is module-scope — call directly. `index` MUST be passed as an explicit parameter (its NAME is the caller's closure identifier `index`) because it is a runConnector/backfill-scoped local, not a module symbol.\n\nSEAM MECHANISM (explicit): every value the helpers need is passed by explicit parameter whose NAME equals the caller's local identifier — usePostgres, connectorId, connectorInstanceId, stream, lastId, PAGE, entries, index — so both call sites read with bare identifiers and no closure capture. Call sites become: `const rows = await readSemanticRecordsPage(usePostgres, connectorInstanceId, stream, lastId, PAGE);` and `await flushSemanticIndexEntries(usePostgres, connectorId, connectorInstanceId, entries, index);`.\n\nPRESERVE EXACTLY IN THE LOOP: the `if (signal?.aborted) throw ...` cancellation check and its comment, `if (rows.length === 0) break;`, the entries-building inner loop (lastId = Number(row.id); JSON.parse try/catch continue; declaredFields embed loop with normalizeSemanticEmbeddingInput / encodeScopeKey / existingKeys dedupe / backend.embedDocument / entries.push), scanned += rows.length; indexed += entries.length;, the progressJob = updateBackfillJob(...) update, await yieldImmediate();, and `if (rows.length < PAGE) break;`. The usePostgres computation and `const index = usePostgres ? null : ensureVectorIndex();` guard stay at the top. NO new module file, NO behavior change, NO change to loop-carried state ownership."
