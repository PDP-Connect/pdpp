why_this_matters: "Commit 2f122e547 ('fix(postgres): make record index bootstrap idempotent') fixed a real production defect: the bootstrap was dropping/recreating hot record/search indexes on EVERY boot, causing lock churn and rebuild cost. The fix gates recreation behind `if (matchesExpected) return;` in ensurePostgresIndexDefinition (postgres-storage.js:2221) under an advisory lock. The commit shipped test/postgres-record-index-bootstrap.test.js, but that test has NO demonstrated mutation-kill evidence — it is a plausibly-passing regression test whose ability to actually CATCH a re-regression is unproven. This packet adds a SHARP oid-stability oracle (a new file, disjoint touchset) and PROVES via the mutation ladder that removing the idempotency gate makes it go red — turning the commit's contract into pinned-and-mutation-verified coverage. The idempotency invariant is high-value: a silent regression reintroduces boot-time index churn on the live 18GB Postgres."
plan:
  transform_class: add-idempotency-oid-stability-oracle
  instruction: "Create test/postgres-record-index-idempotency-oracle.test.js (NEW file; touch no source). Follow the harness of test/postgres-record-index-bootstrap.test.js EXACTLY (guard on PDPP_TEST_POSTGRES_URL; withTempDb helper that CREATEs/DROPs its own throwaway db off the admin /postgres URL; readIndex via pg_get_indexdef + oid). Pin the idempotency contract by asserting: (1) after two consecutive initPostgresStorage calls on the same fresh db, readIndex('idx_pg_records_stream_version').oid is IDENTICAL across the two boots (a matching index is NOT dropped/recreated) — the core 2f122e547 contract; (2) the index EXISTS and is valid after the first boot (oid present). Keep it to the record-stream index oid-stability assertion (the repair-side contract is pinned by tst-record-index-repair-0009 — do NOT duplicate). When PDPP_TEST_POSTGRES_URL is unset, register a single skipped test exactly like the sibling. Use pg Pool from the same import. node:assert/strict."
